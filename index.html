// Вставь это внутрь тега <script> вместо старых функций auth и socket.on('auth-success')

// Проверка авто-входа при загрузке
window.onload = () => {
    const savedUser = JSON.parse(localStorage.getItem('chat_user'));
    if (savedUser) {
        socket.emit('login', savedUser);
    }
};

function auth(type) {
    const login = document.getElementById('login-input').value;
    const pass = document.getElementById('pass-input').value;
    if (login && pass) {
        const userData = { login: login, password: pass };
        // Сохраняем для авто-входа в будущем
        localStorage.setItem('chat_user', JSON.stringify(userData));
        socket.emit(type, userData);
    }
}

socket.on('auth-success', (data) => {
    myName = data.user;
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('app-container').style.display = 'flex';
});

socket.on('auth-error', (msg) => {
    // Если авто-вход не удался, очищаем память
    localStorage.removeItem('chat_user');
    document.getElementById('error-msg').innerText = msg;
    document.getElementById('auth-screen').style.display = 'flex';
});

// Кнопка Выхода (по желанию добавь в HTML)
function logout() {
    localStorage.removeItem('chat_user');
    location.reload();
}
