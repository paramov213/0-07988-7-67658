<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clash Royale Web Clone - Full Version</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #2c3e50;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            color: white;
        }

        #game-container {
            position: relative;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
            border: 4px solid #34495e;
        }

        canvas {
            background-color: #7cfc00;
            display: block;
            cursor: crosshair;
        }

        #ui-layer {
            position: absolute;
            bottom: 10px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            pointer-events: none;
        }

        #elixir-bar-container {
            width: 80%;
            height: 20px;
            background: #444;
            border: 2px solid #fff;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 10px;
        }

        #elixir-fill {
            height: 100%;
            width: 50%;
            background: linear-gradient(90deg, #c018d4, #ff00ff);
            transition: width 0.1s linear;
        }

        #cards-container {
            display: flex;
            gap: 10px;
            pointer-events: auto;
        }

        .card {
            width: 70px;
            height: 90px;
            background: #ecf0f1;
            border-radius: 8px;
            border: 3px solid #bdc3c7;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #2c3e50;
            font-weight: bold;
            font-size: 12px;
            cursor: pointer;
            transition: transform 0.1s;
            user-select: none;
        }

        .card:hover {
            transform: translateY(-5px);
            background: #fff;
        }

        .card.active {
            border-color: #e67e22;
            background: #fdebd0;
        }

        #stats {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0,0,0,0.6);
            padding: 5px 10px;
            border-radius: 5px;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="stats">Эликсир: <span id="elixir-text">5</span></div>
        <canvas id="gameCanvas"></canvas>
        
        <div id="ui-layer">
            <div id="elixir-bar-container">
                <div id="elixir-fill"></div>
            </div>
            <div id="cards-container">
                <div class="card" onclick="selectCard(0, this)">Рыцарь<br>(3)</div>
                <div class="card" onclick="selectCard(1, this)">Лучник<br>(2)</div>
                <div class="card" onclick="selectCard(2, this)">Гигант<br>(5)</div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const elixirFill = document.getElementById('elixir-fill');
        const elixirText = document.getElementById('elixir-text');

        // Настройки экрана
        canvas.width = 400;
        canvas.height = 700;

        // Состояние игры
        let elixir = 5;
        let enemyElixir = 5;
        const maxElixir = 10;
        let selectedCardIndex = 0;
        
        const cardData = [
            { name: "Рыцарь", cost: 3, hp: 600, range: 40, damage: 10, speed: 1.2, color: '#3498db' },
            { name: "Лучник", cost: 2, hp: 250, range: 150, damage: 15, speed: 1.0, color: '#9b59b6' },
            { name: "Гигант", cost: 5, hp: 2000, range: 30, damage: 20, speed: 0.6, color: '#f1c40f' }
        ];

        let units = [];
        let towers = [];
        let projectiles = [];

        class Tower {
            constructor(x, y, side, isKing) {
                this.x = x;
                this.y = y;
                this.side = side; // 'player' или 'enemy'
                this.isKing = isKing;
                this.hp = isKing ? 3000 : 1500;
                this.maxHp = this.hp;
                this.range = 200;
                this.fireRate = 60; // кадры между выстрелами
                this.timer = 0;
                this.radius = isKing ? 30 : 22;
                this.alive = true;
            }

            draw() {
                if (!this.alive) return;
                ctx.fillStyle = this.side === 'player' ? '#2980b9' : '#c0392b';
                ctx.beginPath();
                ctx.roundRect(this.x - this.radius, this.y - this.radius, this.radius * 2, this.radius * 2, 5);
                ctx.fill();
                ctx.strokeStyle = 'white';
                ctx.lineWidth = 2;
                ctx.stroke();

                // HP Bar
                const barWidth = 50;
                ctx.fillStyle = '#444';
                ctx.fillRect(this.x - 25, this.y - 40, barWidth, 6);
                ctx.fillStyle = '#2ecc71';
                ctx.fillRect(this.x - 25, this.y - 40, (this.hp / this.maxHp) * barWidth, 6);
            }

            update() {
                if (!this.alive) return;
                this.timer++;
                if (this.timer >= this.fireRate) {
                    let target = this.findNearestEnemy();
                    if (target) {
                        projectiles.push(new Projectile(this.x, this.y, target, this.side));
                        this.timer = 0;
                    }
                }
            }

            findNearestEnemy() {
                let nearest = null;
                let minDist = this.range;
                units.forEach(u => {
                    if (u.side !== this.side) {
                        let d = Math.hypot(u.x - this.x, u.y - this.y);
                        if (d < minDist) {
                            minDist = d;
                            nearest = u;
                        }
                    }
                });
                return nearest;
            }
        }

        class Unit {
            constructor(x, y, side, config) {
                this.x = x;
                this.y = y;
                this.side = side;
                this.hp = config.hp;
                this.maxHp = config.hp;
                this.range = config.range;
                this.damage = config.damage;
                this.speed = config.speed;
                this.color = config.color;
                this.radius = 12;
                this.alive = true;
                this.attackTimer = 0;
            }

            draw() {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = this.side === 'player' ? 'blue' : 'red';
                ctx.lineWidth = 3;
                ctx.stroke();

                // HP Bar
                ctx.fillStyle = 'red';
                ctx.fillRect(this.x - 12, this.y - 20, 24, 4);
                ctx.fillStyle = 'lime';
                ctx.fillRect(this.x - 12, this.y - 20, (this.hp / this.maxHp) * 24, 4);
            }

            update() {
                let target = this.findTarget();
                if (target) {
                    let dist = Math.hypot(target.x - this.x, target.y - this.y);
                    if (dist > this.range) {
                        let angle = Math.atan2(target.y - this.y, target.x - this.x);
                        this.x += Math.cos(angle) * this.speed;
                        this.y += Math.sin(angle) * this.speed;
                    } else {
                        // Атака
                        this.attackTimer++;
                        if (this.attackTimer >= 50) {
                            target.hp -= this.damage;
                            this.attackTimer = 0;
                        }
                    }
                }
            }

            findTarget() {
                // Сначала ищем ближайшего юнита
                let nearest = null;
                let minDist = 9999;
                
                units.concat(towers).forEach(obj => {
                    if (obj.side !== this.side && obj.alive) {
                        let d = Math.hypot(obj.x - this.x, obj.y - this.y);
                        if (d < minDist) {
                            minDist = d;
                            nearest = obj;
                        }
                    }
                });
                return nearest;
            }
        }

        class Projectile {
            constructor(x, y, target, side) {
                this.x = x;
                this.y = y;
                this.target = target;
                this.side = side;
                this.speed = 5;
                this.damage = 40;
                this.alive = true;
            }

            update() {
                if (!this.target.alive) { this.alive = false; return; }
                let angle = Math.atan2(this.target.y - this.y, this.target.x - this.x);
                this.x += Math.cos(angle) * this.speed;
                this.y += Math.sin(angle) * this.speed;

                if (Math.hypot(this.target.x - this.x, this.target.y - this.y) < 10) {
                    this.target.hp -= this.damage;
                    this.alive = false;
                }
            }

            draw() {
                ctx.fillStyle = 'black';
                ctx.beginPath();
                ctx.arc(this.x, this.y, 4, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function initGame() {
            // Башни игрока
            towers.push(new Tower(200, 630, 'player', true));
            towers.push(new Tower(80, 530, 'player', false));
            towers.push(new Tower(320, 530, 'player', false));

            // Башни врага
            towers.push(new Tower(200, 70, 'enemy', true));
            towers.push(new Tower(80, 170, 'enemy', false));
            towers.push(new Tower(320, 170, 'enemy', false));
        }

        function drawArena() {
            // Трава
            ctx.fillStyle = '#55a630';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Река
            ctx.fillStyle = '#0077b6';
            ctx.fillRect(0, canvas.height/2 - 25, canvas.width, 50);

            // Мосты
            ctx.fillStyle = '#795548';
            ctx.fillRect(60, canvas.height/2 - 35, 60, 70);
            ctx.fillRect(280, canvas.height/2 - 35, 60, 70);

            // Сетка дорожек
            ctx.strokeStyle = 'rgba(255,255,255,0.1)';
            ctx.lineWidth = 1;
            for(let i=0; i<canvas.width; i+=40) {
                ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i, canvas.height); ctx.stroke();
            }
        }

        function selectCard(index, el) {
            selectedCardIndex = index;
            document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
        }

        canvas.addEventListener('mousedown', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            // Ограничение зоны высадки (только на своей половине)
            if (y > canvas.height / 2 + 30) {
                let cost = cardData[selectedCardIndex].cost;
                if (elixir >= cost) {
                    units.push(new Unit(x, y, 'player', cardData[selectedCardIndex]));
                    elixir -= cost;
                }
            }
        });

        // БОТ: Простая логика противника
        function enemyAI() {
            if (enemyElixir >= 5) {
                let randomCard = cardData[Math.floor(Math.random() * cardData.length)];
                let spawnX = Math.random() * (canvas.width - 40) + 20;
                let spawnY = Math.random() * 100 + 100;
                units.push(new Unit(spawnX, spawnY, 'enemy', randomCard));
                enemyElixir -= randomCard.cost;
            }
        }

        function update() {
            // Эликсир
            if (elixir < maxElixir) elixir += 0.008;
            if (enemyElixir < maxElixir) enemyElixir += 0.007;

            elixirFill.style.width = (elixir / maxElixir) * 100 + '%';
            elixirText.innerText = Math.floor(elixir);

            units = units.filter(u => u.hp > 0);
            towers.forEach(t => { if(t.hp <= 0) t.alive = false; });
            projectiles = projectiles.filter(p => p.alive);

            units.forEach(u => u.update());
            towers.forEach(t => t.update());
            projectiles.forEach(p => p.update());

            enemyAI();
        }

        function draw() {
            drawArena();
            towers.forEach(t => t.draw());
            units.forEach(u => u.draw());
            projectiles.forEach(p => p.draw());
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        initGame();
        gameLoop();
    </script>
</body>
</html>
