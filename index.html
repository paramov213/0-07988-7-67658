<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="style.css">
    <title>celestra</title>
</head>
<body>
    <div id="auth-screen" class="auth-wrapper">
        <div class="human-card animate-float">
            <h1 class="brand-name">celestra</h1>
            <div class="input-group">
                <input type="text" id="login-input" required autocomplete="off">
                <label>Логин</label>
                <div class="bar"></div>
            </div>
            <div class="input-group">
                <input type="password" id="pass-input" required autocomplete="off">
                <label>Пароль</label>
                <div class="bar"></div>
            </div>
            <p id="error-msg" class="error-txt"></p>
            <div class="auth-btns">
                <button onclick="auth('login')" class="primary-btn">Войти</button>
                <button onclick="auth('register')" class="link-btn">Регистрация</button>
            </div>
        </div>
    </div>

    <div id="app-container" class="main-layout" style="display: none;">
        <aside class="sidebar">
            <div class="search-bar">
                <input type="text" id="user-search" placeholder="Поиск @юзера..." oninput="doSearch()">
                <div id="search-results"></div>
            </div>
            <div id="chats-list" class="scrollable"></div>
            <div class="my-profile-mini" onclick="openSettings()">
                <img id="my-avatar-btn" src="">
                <span id="my-name-display">Загрузка...</span>
                <span class="settings-gear">⚙️</span>
            </div>
        </aside>

        <main class="chat-area">
            <div id="welcome-screen" class="welcome-box">
                <div class="logo-circle">c</div>
                <h2>Привет в celestra</h2>
                <p>Выбери чат или найди друга по юзернейму</p>
            </div>

            <div id="active-chat" style="display: none; flex-direction: column; height: 100%;">
                <header class="chat-top" onclick="viewOtherProfile()">
                    <div id="current-contact" class="chat-title">Чат</div>
                </header>
                <div id="chat-window" class="scrollable"></div>
                <div class="input-container">
                    <div class="input-wrapper">
                        <label class="attach">📷<input type="file" id="photo-input" onchange="sendPhoto()" hidden></label>
                        <input type="text" id="msg" placeholder="Напишите..." onkeydown="if(event.key==='Enter') sendPrivate()">
                        <button onclick="sendPrivate()" class="send-btn">➤</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div id="settings-modal" class="overlay" style="display:none;" onclick="if(event.target==this)this.style.display='none'">
        <div class="nitro-card animate-slide-up">
            <div id="nitro-banner" class="nitro-banner"><div class="banner-hint" id="edit-banner-btn">Изменить баннер</div></div>
            <div class="nitro-content">
                <div class="nitro-header">
                    <div class="ava-nitro" id="ava-edit-trigger">
                        <img id="edit-avatar-preview" src="">
                        <input type="file" id="avatar-upload" hidden onchange="previewAva(this)">
                    </div>
                </div>
                <div class="nitro-body">
                    <input type="text" id="edit-name" class="nitro-name-edit">
                    <p id="nitro-username">@user</p>
                    <div class="nitro-divider"></div>
                    <label class="nitro-label">О СЕБЕ</label>
                    <div id="bio-view" class="bio-display"></div>
                    <textarea id="edit-bio" class="bio-edit"></textarea>
                </div>
                <div class="nitro-footer" id="modal-btns"></div>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let myName = "", currentChatUser = null, chatMessages = {}, myProfile = {};

        function auth(type) {
            const login = document.getElementById('login-input').value;
            const password = document.getElementById('pass-input').value;
            if(!login || !password) return;
            socket.emit('auth', {login, password, type});
        }

        socket.on('auth-success', data => {
            myName = data.user; myProfile = data.profile;
            document.getElementById('auth-screen').classList.add('fade-out');
            setTimeout(() => {
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('app-container').style.display = 'flex';
                updateMyUI();
            }, 400);
            if(data.history) {
                data.history.forEach(m => {
                    const p = m.from === myName ? m.to : m.from;
                    if(!chatMessages[p]) chatMessages[p] = [];
                    chatMessages[p].push(m);
                });
                updateChatsUI();
            }
        });

        socket.on('auth-error', msg => document.getElementById('error-msg').innerText = msg);

        function doSearch() {
            const v = document.getElementById('user-search').value;
            if(v.length > 1) socket.emit('search-user', v);
            else document.getElementById('search-results').innerHTML = '';
        }

        socket.on('search-result', d => {
            const res = document.getElementById('search-results');
            res.innerHTML = d.exists ? `<div class="search-res-item" onclick="openChat('${d.username}')">@${d.username}</div>` : `<div class="search-res-item no-res">Не найден</div>`;
        });

        function openChat(u) {
            currentChatUser = u;
            document.getElementById('welcome-screen').style.display = 'none';
            document.getElementById('active-chat').style.display = 'flex';
            document.getElementById('current-contact').innerText = "@" + u;
            document.getElementById('search-results').innerHTML = '';
            document.getElementById('user-search').value = '';
            renderMsgs(u);
            updateChatsUI();
        }

        function renderMsgs(u) {
            const win = document.getElementById('chat-window'); win.innerHTML = '';
            (chatMessages[u] || []).forEach(m => {
                const div = document.createElement('div');
                div.className = `msg-row ${m.from === myName ? 'me' : 'them'}`;
                div.innerHTML = `<div class="bubble">${m.text || ''}${m.image ? `<img src="${m.image}">` : ''}</div><div class="time">${m.time}</div>`;
                win.appendChild(div);
            });
            win.scrollTop = win.scrollHeight;
        }

        function updateChatsUI() {
            const list = document.getElementById('chats-list'); list.innerHTML = '';
            Object.keys(chatMessages).forEach(u => {
                const div = document.createElement('div');
                div.className = `chat-tab ${currentChatUser === u ? 'active' : ''}`;
                div.onclick = () => openChat(u);
                div.innerText = u;
                list.appendChild(div);
            });
        }

        socket.on('msg-receive', m => {
            const p = m.from === myName ? m.to : m.from;
            if (m.from === myName || m.to === myName) {
                if(!chatMessages[p]) chatMessages[p] = [];
                chatMessages[p].push(m);
                if(p === currentChatUser) renderMsgs(p);
                updateChatsUI();
            }
        });

        function sendPrivate() {
            const v = document.getElementById('msg').value;
            if(v.trim() && currentChatUser) {
                socket.emit('private-message', {to: currentChatUser, text: v});
                document.getElementById('msg').value = '';
            }
        }

        function sendPhoto() {
            const f = document.getElementById('photo-input').files[0];
            if(f && currentChatUser) {
                const r = new FileReader();
                r.onload = e => socket.emit('private-message', {to: currentChatUser, text: "", image: e.target.result});
                r.readAsDataURL(f);
            }
        }

        function updateMyUI() {
            document.getElementById('my-avatar-btn').src = myProfile.avatar || 'https://cdn0.iconfinder.com/data/icons/social-messaging-ui-color-shapes-3/3/51-512.png';
            document.getElementById('my-name-display').innerText = myProfile.displayName;
        }

        function viewOtherProfile() { if(currentChatUser) socket.emit('get-user-profile', currentChatUser); }
        function openSettings() { showNitroProfile(myProfile, true, myName); }
        socket.on('user-profile-data', d => showNitroProfile(d, false, d.username));

        function showNitroProfile(data, isMe, username) {
            document.getElementById('nitro-banner').style.background = data.banner || 'var(--grad)';
            document.getElementById('edit-avatar-preview').src = data.avatar || 'https://cdn0.iconfinder.com/data/icons/social-messaging-ui-color-shapes-3/3/51-512.png';
            document.getElementById('nitro-username').innerText = "@" + username;
            
            const bioView = document.getElementById('bio-view');
            const bioEdit = document.getElementById('edit-bio');
            const nameEdit = document.getElementById('edit-name');
            const btns = document.getElementById('modal-btns');

            if(isMe) {
                bioView.style.display = 'none'; bioEdit.style.display = 'block';
                nameEdit.removeAttribute('readonly');
                nameEdit.value = data.displayName;
                bioEdit.value = data.bio || "";
                document.getElementById('edit-banner-btn').style.display = 'block';
                btns.innerHTML = `<button onclick="saveProfile()" class="save-btn">Сохранить</button><button onclick="logout()" class="exit-btn">Выйти</button>`;
                document.getElementById('ava-edit-trigger').onclick = () => document.getElementById('avatar-upload').click();
                document.getElementById('edit-banner-btn').onclick = () => {
                   const color = prompt("Введи HEX (#ffffff) или градиент:", "linear-gradient(45deg, #6e8efb, #a777e3)");
                   if(color) document.getElementById('nitro-banner').style.background = color;
                };
            } else {
                bioView.style.display = 'block'; bioEdit.style.display = 'none';
                nameEdit.setAttribute('readonly', true);
                nameEdit.value = data.displayName;
                bioView.innerText = data.bio || "Пусто...";
                document.getElementById('edit-banner-btn').style.display = 'none';
                btns.innerHTML = `<button onclick="document.getElementById('settings-modal').style.display='none'" class="close-btn">Закрыть</button>`;
                document.getElementById('ava-edit-trigger').onclick = null;
            }
            document.getElementById('settings-modal').style.display = 'flex';
        }

        function previewAva(i) {
            const r = new FileReader();
            r.onload = e => document.getElementById('edit-avatar-preview').src = e.target.result;
            r.readAsDataURL(i.files[0]);
        }

        function saveProfile() {
            const avatar = document.getElementById('edit-avatar-preview').src;
            const displayName = document.getElementById('edit-name').value;
            const bio = document.getElementById('edit-bio').value;
            const banner = document.getElementById('nitro-banner').style.background;
            socket.emit('update-profile', {avatar, displayName, bio, banner});
            document.getElementById('settings-modal').style.display = 'none';
        }
        socket.on('profile-updated', d => { myProfile = d; updateMyUI(); });
        function logout() { localStorage.removeItem('cel_creds'); location.reload(); }
    </script>
</body>
</html>
