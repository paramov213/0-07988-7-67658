<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <title>Celestra Ultra Build v4.0 — Stable Extended</title>
    
    <style>
        /* Базовые настройки отображения */
        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            outline: none; 
            margin: 0; 
            padding: 0; 
        }

        /* Настройки тела документа */
        body, 
        html { 
            height: 100%; 
            background-color: #000000; 
            color: #ffffff; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            overflow: hidden; 
            position: fixed; 
            width: 100%; 
        }

        /* Вспомогательные классы для флекс-сетки */
        .flex-center { 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }

        /* Экран авторизации и регистрации */
        .full-page { 
            position: fixed; 
            top: 0; 
            left: 0; 
            right: 0; 
            bottom: 0; 
            background: radial-gradient(circle at center, #1c1c1e 0%, #000000 100%); 
            z-index: 9999; 
        }

        /* Контейнер формы входа */
        .auth-box { 
            width: 85%; 
            max-width: 320px; 
            text-align: center; 
        }

        /* Логотип приложения */
        .brand { 
            font-size: 48px; 
            font-weight: 900; 
            color: #007aff; 
            margin-bottom: 40px; 
            letter-spacing: -2px; 
            text-shadow: 0 0 20px rgba(0, 122, 255, 0.4); 
        }

        /* Поля ввода данных */
        input[type="text"], 
        input[type="password"], 
        textarea { 
            width: 100%; 
            padding: 18px; 
            background: #1c1c1e; 
            border: 1px solid #333333; 
            border-radius: 20px; 
            color: #ffffff; 
            margin-bottom: 15px; 
            font-size: 16px; 
            transition: all 0.3s ease; 
        }

        /* Состояние фокуса для инпутов */
        input:focus { 
            border-color: #007aff; 
            background: #2c2c2e; 
            box-shadow: 0 0 10px rgba(0, 122, 255, 0.2);
        }

        /* Основные кнопки */
        .btn-primary { 
            background: #007aff; 
            border: none; 
            padding: 18px; 
            width: 100%; 
            border-radius: 20px; 
            color: #ffffff; 
            font-weight: 800; 
            cursor: pointer; 
            font-size: 16px; 
            transition: transform 0.2s, background 0.2s; 
        }

        /* Эффект нажатия на кнопку */
        .btn-primary:active { 
            transform: scale(0.96); 
            background: #005ecb; 
        }

        /* Ссылочные кнопки */
        .btn-link { 
            background: none; 
            border: none; 
            color: #8e8e93; 
            margin-top: 20px; 
            cursor: pointer; 
            font-size: 14px; 
            text-decoration: none; 
            display: block; 
            width: 100%; 
        }

        /* Общие настройки страниц */
        .page { 
            position: absolute; 
            top: 0; 
            left: 0; 
            right: 0; 
            bottom: 0; 
            background: #000000; 
            display: none; 
            flex-direction: column; 
        }

        /* Состояние активной страницы */
        .page.active { 
            display: flex; 
        }

        /* Окно чата с анимацией */
        #chat-view { 
            transform: translateX(100%); 
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1); 
            z-index: 100; 
        }

        /* Когда чат открыт */
        #chat-view.active { 
            transform: translateX(0); 
        }

        /* Верхняя панель (Header) */
        .header { 
            height: 70px; 
            padding: 0 20px; 
            display: flex; 
            align-items: center; 
            background: rgba(28, 28, 30, 0.85); 
            backdrop-filter: blur(25px); 
            -webkit-backdrop-filter: blur(25px); 
            border-bottom: 1px solid #222222; 
            gap: 15px; 
            position: sticky; 
            top: 0; 
            z-index: 50; 
        }

        /* Мини-аватарка пользователя */
        .mini-ava { 
            width: 44px; 
            height: 44px; 
            border-radius: 50%; 
            object-fit: cover; 
            border: 2px solid #007aff; 
            cursor: pointer; 
            transition: opacity 0.2s; 
        }

        .mini-ava:active { 
            opacity: 0.7; 
        }

        /* Текст логотипа в шапке */
        .logo-text { 
            font-weight: 900; 
            font-size: 24px; 
            flex: 1; 
            letter-spacing: -0.8px; 
        }

        /* Счетчик монет */
        .coins-top { 
            background: #32d74b; 
            color: #000000; 
            padding: 8px 14px; 
            border-radius: 14px; 
            font-weight: 900; 
            font-size: 14px; 
            box-shadow: 0 4px 10px rgba(50, 215, 75, 0.2); 
        }

        /* Контейнер поиска */
        .search-container { 
            padding: 15px 20px; 
            position: relative; 
            background: #000000; 
        }

        /* Результаты поиска выпадающим списком */
        .search-results { 
            position: absolute; 
            top: 75px; 
            left: 20px; 
            right: 20px; 
            background: #1c1c1e; 
            border-radius: 24px; 
            z-index: 2000; 
            display: none; 
            border: 1px solid #333333; 
            max-height: 350px; 
            overflow-y: auto; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
        }

        /* Элемент в списке поиска */
        .search-item { 
            padding: 15px; 
            display: flex; 
            gap: 15px; 
            border-bottom: 1px solid #2c2c2e; 
            align-items: center; 
            cursor: pointer; 
        }

        .search-item img { 
            width: 45px; 
            height: 45px; 
            border-radius: 50%; 
            object-fit: cover; 
        }

        /* Список чатов (Content) */
        .content { 
            flex: 1; 
            overflow-y: auto; 
            -webkit-overflow-scrolling: touch; 
        }

        /* Строка чата */
        .chat-row { 
            padding: 18px 20px; 
            display: flex; 
            gap: 15px; 
            border-bottom: 1px solid #111111; 
            align-items: center; 
            transition: background 0.3s; 
            cursor: pointer; 
        }

        .chat-row:active { 
            background: #1c1c1e; 
        }

        /* Аватар в списке чатов */
        .row-ava { 
            width: 60px; 
            height: 60px; 
            border-radius: 50%; 
            object-fit: cover; 
        }

        /* Инфо чата */
        .row-info { 
            flex: 1; 
        }

        .row-info b { 
            display: block; 
            margin-bottom: 5px; 
            font-size: 18px; 
        }

        .row-info p { 
            margin: 0; 
            color: #8e8e93; 
            font-size: 15px; 
            white-space: nowrap; 
            overflow: hidden; 
            text-overflow: ellipsis; 
            max-width: 220px; 
        }

        /* Секция сообщений */
        .messages { 
            padding: 25px 20px; 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
        }

        /* Строка одного сообщения */
        .msg-row { 
            display: flex; 
            width: 100%; 
        }

        /* Мои сообщения */
        .msg-row.me { 
            justify-content: flex-end; 
        }

        /* Пузырь сообщения */
        .bubble { 
            max-width: 80%; 
            padding: 14px 18px; 
            border-radius: 22px; 
            position: relative; 
            font-size: 16px; 
            line-height: 1.5; 
        }

        .me .bubble { 
            background: #007aff; 
            color: #ffffff; 
            border-bottom-right-radius: 5px; 
        }

        .ot .bubble { 
            background: #2c2c2e; 
            color: #ffffff; 
            border-bottom-left-radius: 5px; 
        }

        /* Время сообщения */
        .bubble small { 
            display: block; 
            font-size: 11px; 
            opacity: 0.6; 
            margin-top: 8px; 
            text-align: right; 
        }

        /* Медиа внутри сообщения */
        .msg-media { 
            max-width: 100%; 
            border-radius: 15px; 
            margin-top: 8px; 
            display: block; 
            cursor: pointer; 
        }

        /* Панель ввода */
        .input-area { 
            padding: 15px 20px; 
            background: #1c1c1e; 
            border-top: 1px solid #222222; 
            padding-bottom: calc(15px + env(safe-area-inset-bottom)); 
        }

        .input-row { 
            display: flex; 
            gap: 15px; 
            align-items: center; 
        }

        /* Иконки кнопок */
        .btn-icon { 
            font-size: 24px; 
            cursor: pointer; 
            opacity: 0.8; 
            transition: opacity 0.2s; 
        }

        .btn-icon:active { 
            opacity: 1; 
        }

        /* Кнопка отправки */
        .btn-send { 
            background: none; 
            border: none; 
            font-size: 28px; 
            cursor: pointer; 
            color: #007aff; 
        }

        /* Модальные окна */
        .modal { 
            position: fixed; 
            top: 0; 
            left: 0; 
            right: 0; 
            bottom: 0; 
            background: rgba(0, 0, 0, 0.95); 
            z-index: 9000; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            backdrop-filter: blur(15px); 
            -webkit-backdrop-filter: blur(15px); 
        }

        /* Карточка профиля в модалке */
        .modal-card { 
            background: #1c1c1e; 
            width: 90%; 
            max-width: 380px; 
            padding: 35px; 
            border-radius: 40px; 
            text-align: center; 
            border: 1px solid #333333; 
            overflow-y: auto; 
            max-height: 85vh; 
        }

        /* Большой аватар в профиле */
        .big-ava { 
            width: 120px; 
            height: 120px; 
            border-radius: 50%; 
            border: 4px solid #007aff; 
            margin-bottom: 25px; 
            object-fit: cover; 
            box-shadow: 0 0 25px rgba(0, 122, 255, 0.3); 
        }

        /* Текстовый блок биографии */
        .bio-box { 
            background: #2c2c2e; 
            padding: 20px; 
            border-radius: 20px; 
            margin: 20px 0; 
            color: #d1d1d6; 
            font-size: 16px; 
            text-align: left; 
            line-height: 1.5; 
            word-wrap: break-word;
        }

        /* Система NFT бейджей */
        .nft-container { 
            display: flex; 
            flex-wrap: wrap; 
            justify-content: center; 
            gap: 8px; 
            margin-bottom: 20px; 
            min-height: 30px;
        }

        .nft-badge { 
            background: linear-gradient(135deg, #ffd700, #ffae00); 
            color: #000000; 
            padding: 7px 14px; 
            border-radius: 14px; 
            font-weight: 900; 
            font-size: 12px; 
            text-transform: uppercase; 
            box-shadow: 0 4px 8px rgba(255, 215, 0, 0.2); 
        }

        /* Сетка магазина */
        .shop-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 12px; 
            margin-top: 20px; 
        }

        .nft-buy-btn { 
            border: none; 
            padding: 15px; 
            border-radius: 18px; 
            color: #ffffff; 
            font-weight: 800; 
            cursor: pointer; 
            font-size: 13px; 
            transition: transform 0.2s; 
        }

        /* Секция администратора */
        .admin-section { 
            margin-top: 25px; 
            padding-top: 25px; 
            border-top: 1px solid #333333; 
            text-align: left; 
        }

        .admin-title { 
            font-size: 12px; 
            color: #8e8e93; 
            text-transform: uppercase; 
            margin-bottom: 15px; 
            letter-spacing: 1px; 
        }

        .btn-admin { 
            background: #2c2c2e; 
            color: #ffffff; 
            border: 1px solid #444444; 
            padding: 14px; 
            width: 100%; 
            border-radius: 16px; 
            margin-bottom: 10px; 
            font-size: 14px; 
            cursor: pointer; 
            text-align: left; 
            display: flex; 
            align-items: center; 
            gap: 10px; 
        }

        /* Бейдж огня (стрики) */
        .streak-badge { 
            color: #ff9500; 
            font-weight: 900; 
            font-size: 22px; 
        }
    </style>
</head>
<body>

    <div id="auth-screen" class="full-page flex-center">
        <div class="auth-box">
            <h1 class="brand">CELESTRA</h1>
            <div class="auth-form">
                <input type="text" id="auth-l" placeholder="Логин">
                <input type="password" id="auth-p" placeholder="Пароль">
                
                <button onclick="handleAuthentication('login')" class="btn-primary">
                    ВОЙТИ В АККАУНТ
                </button>
                
                <button onclick="handleAuthentication('reg')" class="btn-link">
                    Создать новый профиль
                </button>
            </div>
        </div>
    </div>

    <div id="app" style="display:none">
        
        <section id="list-view" class="page active">
            <header class="header">
                <div class="header-left" onclick="openMySettings()">
                    <img id="my-ava-img" src="" class="mini-ava">
                </div>
                
                <span class="logo-text">Celestra</span>
                
                <div class="header-right">
                    <div class="coins-top">
                        💰 <span id="display-my-coins">0</span>
                    </div>
                </div>
            </header>
            
            <div class="search-container">
                <input type="text" id="search-input" placeholder="Найти человека..." oninput="executeSearch()">
                <div id="search-results-list" class="search-results">
                    </div>
            </div>

            <div id="chat-list-container" class="content">
                </div>
        </section>

        <section id="chat-view" class="page">
            <header class="header">
                <button onclick="backToDialogs()" class="btn-primary" style="width:50px; padding:12px">✕</button>
                
                <div class="chat-info" onclick="viewUserProfile()" style="flex:1; cursor:pointer; padding-left: 10px;">
                    <b id="chat-header-nick">...</b><br>
                    <small id="chat-header-status" style="color: #32d74b;">в сети</small>
                </div>
                
                <div class="header-right">
                    <div id="chat-header-streak" class="streak-badge"></div>
                </div>
            </header>

            <div id="chat-messages-box" class="content messages">
                </div>

            <footer class="input-area">
                <div id="media-preview-bar" class="media-preview" style="display:none">
                    <span id="media-status-text">Файл выбран</span>
                    <span onclick="discardMedia()" style="color:#ff3b30; cursor:pointer; font-weight:bold; padding: 5px;">✕</span>
                </div>
                
                <div class="input-row">
                    <label class="btn-icon">
                        📁<input type="file" id="file-selector" hidden onchange="processFileSelection(this)">
                    </label>
                    
                    <button id="voice-record-btn" onclick="handleVoiceToggle()" style="background:none; border:none; font-size:24px; cursor:pointer">
                        🎤
                    </button>
                    
                    <input type="text" id="message-text-input" placeholder="Написать..." onkeydown="if(event.key==='Enter') sendMessageToServer()">
                    
                    <button onclick="sendMessageToServer()" class="btn-send">
                        🚀
                    </button>
                </div>
            </footer>
        </section>
    </div>

    <div id="profile-modal" class="modal" style="display:none" onclick="hideProfileModal()">
        <div class="modal-card" onclick="event.stopPropagation()">
            
            <img id="profile-display-ava" src="" class="big-ava">
            
            <div id="view-mode-section">
                <h2 id="profile-display-nick" style="font-size: 26px; font-weight: 800; margin-bottom: 5px;"></h2>
                <p id="profile-display-login" style="color: #8e8e93; font-size: 14px; margin-bottom: 15px;"></p>
                
                <div id="profile-display-bio" class="bio-box"></div>
                
                <div id="profile-display-nfts" class="nft-container">
                    </div>
                
                <div id="shop-section" style="display:none">
                    <div class="admin-title">ЭКСКЛЮЗИВНЫЕ NFT (1000 💰)</div>
                    <div class="shop-grid">
                        <button onclick="purchaseNFT('bich')" class="nft-buy-btn" style="background:#ff3b30">BICH</button>
                        <button onclick="purchaseNFT('duc')" class="nft-buy-btn" style="background:#5856d6">DUC</button>
                        <button onclick="purchaseNFT('dig')" class="nft-buy-btn" style="background:#ff9500">DIG</button>
                        <button onclick="purchaseNFT('big')" class="nft-buy-btn" style="background:#32d74b">BIG</button>
                        <button onclick="purchaseNFT('mid')" class="nft-buy-btn" style="background:#007aff">MID</button>
                    </div>
                </div>
                
                <button id="edit-profile-trigger" onclick="switchToEditMode()" class="btn-link" style="margin-top: 25px; color: #007aff; font-weight: 600;">
                    Настроить профиль
                </button>
            </div>

            <div id="edit-mode-section" style="display:none">
                <div style="text-align: left; margin-bottom: 8px; font-size: 13px; color: #8e8e93;">Аватар (URL):</div>
                <input type="text" id="input-edit-ava">
                
                <div style="text-align: left; margin-bottom: 8px; font-size: 13px; color: #8e8e93;">Никнейм:</div>
                <input type="text" id="input-edit-nick">
                
                <div style="text-align: left; margin-bottom: 8px; font-size: 13px; color: #8e8e93;">Статус:</div>
                <textarea id="input-edit-bio" rows="3"></textarea>
                
                <button onclick="pushProfileUpdates()" class="btn-primary">
                    СОХРАНИТЬ
                </button>
                
                <div id="admin-controls" class="admin-section" style="display:none">
                    <div class="admin-title">DATABASE MANAGEMENT</div>
                    <button onclick="downloadDatabaseBackup()" class="btn-admin">📥 Экспорт БД (JSON)</button>
                    <button onclick="uploadDatabaseBackup()" class="btn-admin">📤 Импорт БД</button>
                </div>

                <button onclick="performLogout()" class="btn-link" style="color:#ff3b30; font-weight:bold; margin-top:30px">ВЫЙТИ ИЗ СИСТЕМЫ</button>
                
                <button onclick="viewUserProfile()" class="btn-link">Вернуться к просмотру</button>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        // ГЛОБАЛЬНОЕ СОСТОЯНИЕ
        const socket = io();
        let currentUserId = ""; 
        let myProfileData = {}; 
        let activeChatPartner = null; 
        
        // Хранилища данных
        let databaseMessages = {}; 
        let userProfilesCache = {}; 
        let userStreaksCache = {}; 
        let userHasAdminRights = false;

        // Состояние медиа-файлов
        let pendingMediaBase64 = null; 
        let pendingMediaType = "text"; 
        let voiceRecorderObject = null; 
        let voiceDataChunks = [];

        // --- 1. АВТОРИЗАЦИЯ И ИНИЦИАЛИЗАЦИЯ ---

        /**
         * Функция входа или регистрации
         */
        function handleAuthentication(actionType) {
            const login = document.getElementById('auth-l').value.trim();
            const password = document.getElementById('auth-p').value.trim();
            
            if (login === "" || password === "") {
                alert('Заполните все поля!');
                return;
            }
            
            // Сохраняем учетные данные для автоматического входа в будущем
            const credentials = { l: login, p: password };
            localStorage.setItem('celestra_auth_cache', JSON.stringify(credentials));
            
            socket.emit('auth', { 
                login: login, 
                password: password, 
                type: actionType 
            });
        }

        /**
         * Проверка сохраненной сессии при загрузке страницы
         */
        window.onload = function() {
            const cachedAuth = localStorage.getItem('celestra_auth_cache');
            if (cachedAuth) {
                const creds = JSON.parse(cachedAuth);
                socket.emit('auth', { 
                    login: creds.l, 
                    password: creds.p, 
                    type: 'login' 
                });
            }
        };

        /**
         * Обработка успешного входа
         */
        socket.on('auth_ok', (response) => {
            currentUserId = response.un; 
            myProfileData = response.prof; 
            userHasAdminRights = response.isAdmin;

            // Обновляем визуальные элементы интерфейса
            syncInterfaceWithUserData(response);

            // Переключаем экраны
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('app').style.display = 'block';

            // Если зашел админ, открываем доступ к инструментам
            if (userHasAdminRights === true) {
                document.getElementById('admin-controls').style.display = 'block';
            }
            
            // Восстанавливаем историю диалогов из локального хранилища
            const activeList = JSON.parse(localStorage.getItem('celestra_active_dialogs') || "[]");
            activeList.forEach(login => {
                socket.emit('get_h', login);
            });
        });

        /**
         * Обновление основных элементов (аватар, монеты)
         */
        function syncInterfaceWithUserData(data) {
            const avatarElement = document.getElementById('my-ava-img');
            const coinsElement = document.getElementById('display-my-coins');
            
            avatarElement.src = data.prof.ava;
            
            if (data.econ.coins === Infinity) {
                coinsElement.innerText = "∞";
            } else {
                coinsElement.innerText = data.econ.coins;
            }
        }

        // --- 2. ПОИСК ПОЛЬЗОВАТЕЛЕЙ ---

        function executeSearch() {
            const queryText = document.getElementById('search-input').value.trim();
            const resultsBox = document.getElementById('search-results-list');
            
            if (queryText.length > 0) {
                socket.emit('search_user', queryText);
            } else {
                resultsBox.style.display = 'none';
            }
        }

        socket.on('search_res', (usersFound) => {
            const resultsBox = document.getElementById('search-results-list');
            resultsBox.innerHTML = '';

            if (usersFound.length > 0) {
                resultsBox.style.display = 'block';
                
                usersFound.forEach(u => {
                    const row = document.createElement('div');
                    row.className = 'search-item';
                    row.innerHTML = `
                        <img src="${u.ava}"> 
                        <div>
                            <b>${u.nick}</b><br>
                            <small style="color:#8e8e93">@${u.login}</small>
                        </div>
                    `;
                    row.onclick = function() {
                        resultsBox.style.display = 'none';
                        document.getElementById('search-input').value = '';
                        startConversationWith(u.login);
                    };
                    resultsBox.appendChild(row);
                });
            } else {
                resultsBox.style.display = 'none';
            }
        });

        // --- 3. РАБОТА С МЕДИА И ГОЛОСОМ ---

        function processFileSelection(input) {
            const selectedFile = input.files[0];
            if (!selectedFile) return;

            const fileReader = new FileReader();
            
            // Определяем тип контента
            if (selectedFile.type.startsWith('image')) {
                pendingMediaType = 'image';
            } else if (selectedFile.type.startsWith('video')) {
                pendingMediaType = 'video';
            } else {
                pendingMediaType = 'file';
            }

            fileReader.onload = (event) => {
                pendingMediaBase64 = event.target.result;
                document.getElementById('media-status-text').innerText = "Готов файл: " + selectedFile.name;
                document.getElementById('media-preview-bar').style.display = 'flex';
            };
            
            fileReader.readAsDataURL(selectedFile);
        }

        function discardMedia() {
            pendingMediaBase64 = null;
            pendingMediaType = "text";
            document.getElementById('media-preview-bar').style.display = 'none';
            document.getElementById('file-selector').value = "";
        }

        async function handleVoiceToggle() {
            const btn = document.getElementById('voice-record-btn');
            
            if (voiceRecorderObject && voiceRecorderObject.state === "recording") {
                voiceRecorderObject.stop();
                btn.innerText = "🎤";
                btn.style.color = "#ffffff";
            } else {
                try {
                    const audioStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    voiceRecorderObject = new MediaRecorder(audioStream);
                    voiceDataChunks = [];

                    voiceRecorderObject.ondataavailable = (e) => {
                        voiceDataChunks.push(e.data);
                    };

                    voiceRecorderObject.onstop = () => {
                        const blob = new Blob(voiceDataChunks, { type: 'audio/ogg' });
                        const reader = new FileReader();
                        reader.onload = (ev) => {
                            pendingMediaBase64 = ev.target.result;
                            pendingMediaType = 'audio';
                            sendMessageToServer(); 
                        };
                        reader.readAsDataURL(blob);
                    };

                    voiceRecorderObject.start();
                    btn.innerText = "🛑";
                    btn.style.color = "#ff3b30";
                } catch (err) {
                    alert('Доступ к микрофону не получен.');
                }
            }
        }

        // --- 4. ОБМЕН СООБЩЕНИЯМИ ---

        function sendMessageToServer() {
            const input = document.getElementById('message-text-input');
            const textValue = input.value;

            // Если и текста нет, и файла нет - ничего не шлем
            if (textValue.trim() === "" && pendingMediaBase64 === null) {
                return;
            }

            const payload = { 
                to: activeChatPartner, 
                txt: textValue, 
                type: pendingMediaType, 
                file: pendingMediaBase64 
            };

            socket.emit('msg', payload);

            // Очистка после отправки
            input.value = '';
            discardMedia();
        }

        /**
         * Прием входящего или своего сообщения
         */
        socket.on('receive', (packet) => {
            // Определяем, кто собеседник (если сообщение от меня - берем 'to', если мне - 'from')
            const partnerId = (packet.msg.f === currentUserId) ? packet.room : packet.msg.f;
            
            if (!databaseMessages[partnerId]) {
                databaseMessages[partnerId] = [];
            }
            
            databaseMessages[partnerId].push(packet.msg);
            userProfilesCache[partnerId] = packet.senderProf;
            userStreaksCache[partnerId] = packet.streak;

            // Если сейчас открыт чат именно с этим человеком - обновляем экран
            if (partnerId === activeChatPartner) {
                renderAllMessages();
                refreshStreakLabel();
            }

            // Обновляем список диалогов на главной
            refreshDialogsList();

            // Сохраняем активность в список последних чатов
            updateLocalDialogCache(partnerId);
        });

        function updateLocalDialogCache(id) {
            let list = JSON.parse(localStorage.getItem('celestra_active_dialogs') || "[]");
            if (list.indexOf(id) === -1) {
                list.push(id);
                localStorage.setItem('celestra_active_dialogs', JSON.stringify(list));
            }
        }

        // --- 5. РЕНДЕРИНГ ИНТЕРФЕЙСА ---

        function renderAllMessages() {
            const box = document.getElementById('chat-messages-box');
            box.innerHTML = '';

            const history = databaseMessages[activeChatPartner] || [];
            
            history.forEach(item => {
                const isMine = (item.f === currentUserId);
                let content = item.txt;

                // Обработка разных типов медиа
                if (item.type === 'image') {
                    content = `<img src="${item.file}" class="msg-media" onclick="window.open('${item.file}')">`;
                } else if (item.type === 'video') {
                    content = `<video src="${item.file}" controls class="msg-media"></video>`;
                } else if (item.type === 'audio') {
                    content = `<audio src="${item.file}" controls style="width: 100%;"></audio>`;
                }

                const wrapper = document.createElement('div');
                wrapper.className = isMine ? 'msg-row me' : 'msg-row ot';
                
                wrapper.innerHTML = `
                    <div class="bubble">
                        ${content}
                        <small>${item.time}</small>
                    </div>
                `;
                box.appendChild(wrapper);
            });

            // Автопрокрутка вниз
            box.scrollTop = box.scrollHeight;
        }

        function refreshDialogsList() {
            const container = document.getElementById('chat-list-container');
            container.innerHTML = '';

            // Сортируем список по времени последнего сообщения
            const sortedKeys = Object.keys(databaseMessages).sort((a, b) => {
                const lastA = databaseMessages[a][databaseMessages[a].length - 1].timestamp;
                const lastB = databaseMessages[b][databaseMessages[b].length - 1].timestamp;
                return lastB - lastA;
            });

            sortedKeys.forEach(login => {
                const msgs = databaseMessages[login];
                const last = msgs[msgs.length - 1];
                const profile = userProfilesCache[login] || { nick: login, ava: '' };
                const streak = userStreaksCache[login] || 0;

                const row = document.createElement('div');
                row.className = 'chat-row';
                row.onclick = () => startConversationWith(login);
                
                row.innerHTML = `
                    <img src="${profile.ava}" class="row-ava">
                    <div class="row-info">
                        <b>${profile.nick} ${streak > 0 ? '🔥' + streak : ''}</b>
                        <p>${last.type === 'text' ? last.txt : '📎 Вложение'}</p>
                    </div>
                `;
                container.appendChild(row);
            });
        }

        // --- 6. ПЕРЕКЛЮЧЕНИЕ ОКОН И ПРОФИЛИ ---

        function startConversationWith(user) {
            activeChatPartner = user;
            socket.emit('get_h', user); // Запрашиваем историю у сервера
            document.getElementById('chat-view').classList.add('active');
        }

        function backToDialogs() {
            activeChatPartner = null;
            document.getElementById('chat-view').classList.remove('active');
        }

        function hideProfileModal() {
            document.getElementById('profile-modal').style.display = 'none';
        }

        /**
         * Открытие настроек своего профиля
         */
        function openMySettings() {
            activeChatPartner = null; // Мы в своем профиле
            viewUserProfile();
            switchToEditMode();
        }

        /**
         * Просмотр данных профиля (своего или чужого)
         */
        function viewUserProfile() {
            // ФИКС: Если активного партнера нет - значит смотрим СЕБЯ
            const isSelfView = (!activeChatPartner || activeChatPartner === currentUserId);
            
            // Берем данные из кеша или своего объекта
            const p = isSelfView ? myProfileData : (userProfilesCache[activeChatPartner] || { nick: activeChatPartner, ava: '', nfts: [] });
            
            // Переключаем интерфейс на режим просмотра
            document.getElementById('edit-mode-section').style.display = 'none';
            document.getElementById('view-mode-section').style.display = 'block';
            
            // Заполнение полей
            document.getElementById('profile-display-ava').src = p.ava;
            document.getElementById('profile-display-nick').innerText = p.nick;
            document.getElementById('profile-display-login').innerText = "@" + (isSelfView ? currentUserId : activeChatPartner);
            document.getElementById('profile-display-bio').innerText = p.bio || 'Статус отсутствует.';
            
            // Рендер NFT (ФИКС ОТОБРАЖЕНИЯ)
            const nftBox = document.getElementById('profile-display-nfts');
            nftBox.innerHTML = '';
            const nftsToRender = p.nfts || [];
            
            nftsToRender.forEach(tag => {
                const span = document.createElement('span');
                span.className = 'nft-badge';
                span.innerText = tag;
                nftBox.appendChild(span);
            });
            
            // Показываем магазин и кнопку редактирования только если это МОЙ профиль
            document.getElementById('shop-section').style.display = isSelfView ? 'block' : 'none';
            document.getElementById('edit-profile-trigger').style.display = isSelfView ? 'block' : 'none';
            
            document.getElementById('profile-modal').style.display = 'flex';
        }

        function switchToEditMode() {
            document.getElementById('view-mode-section').style.display = 'none';
            document.getElementById('edit-mode-section').style.display = 'block';
            
            // Подстановка текущих значений в инпуты
            document.getElementById('input-edit-nick').value = myProfileData.nick;
            document.getElementById('input-edit-ava').value = myProfileData.ava;
            document.getElementById('input-edit-bio').value = myProfileData.bio || "";
        }

        // --- 7. ЭКОНОМИКА И ОБНОВЛЕНИЯ ---

        function purchaseNFT(code) {
            if (confirm(`Подтвердите покупку NFT "${code}" за 1000 монет`)) {
                socket.emit('buy_nft', code);
            }
        }

        function pushProfileUpdates() {
            const data = { 
                nick: document.getElementById('input-edit-nick').value, 
                ava: document.getElementById('input-edit-ava').value, 
                bio: document.getElementById('input-edit-bio').value 
            };

            socket.emit('update_profile', data);
            hideProfileModal();
        }

        /**
         * Слушатель обновления моего профиля от сервера
         */
        socket.on('update_ok', (newObj) => {
            myProfileData = newObj;
            document.getElementById('my-ava-img').src = newObj.ava;
            
            // Если в данный момент открыто окно моего профиля - обновляем его
            if (!activeChatPartner || activeChatPartner === currentUserId) {
                viewUserProfile();
            }
        });

        socket.on('econ_update', (e) => {
            const coinLabel = document.getElementById('display-my-coins');
            coinLabel.innerText = (e.coins === Infinity) ? "∞" : e.coins;
        });

        /**
         * Обработка данных истории диалога
         */
        socket.on('h_res', (data) => {
            databaseMessages[data.target] = data.msgs;
            userProfilesCache[data.target] = data.prof;
            userStreaksCache[data.target] = data.streak;
            
            if (activeChatPartner === data.target) {
                document.getElementById('chat-header-nick').innerText = data.prof.nick;
                
                const statusLabel = document.getElementById('chat-header-status');
                if (data.prof.ls === 'Online') {
                    statusLabel.innerText = 'в сети';
                    statusLabel.style.color = '#32d74b';
                } else {
                    statusLabel.innerText = 'был(а) ' + data.prof.ls;
                    statusLabel.style.color = '#8e8e93';
                }
                
                refreshStreakLabel();
                renderAllMessages();
            }
            refreshDialogsList();
        });

        function refreshStreakLabel() {
            const label = document.getElementById('chat-header-streak');
            const val = userStreaksCache[activeChatPartner] || 0;
            label.innerText = (val > 0) ? '🔥 ' + val : '';
        }

        // --- 8. АДМИНИСТРИРОВАНИЕ БАЗЫ ---

        function downloadDatabaseBackup() {
            socket.emit('admin_export_db');
        }

        socket.on('admin_db_data', (jsonString) => {
            const blob = new Blob([jsonString], { type: 'application/json' });
            const downloadUrl = URL.createObjectURL(blob);
            
            const anchor = document.createElement('a');
            anchor.href = downloadUrl;
            anchor.download = `celestra_dump_${Date.now()}.json`;
            anchor.click();
        });

        function uploadDatabaseBackup() {
            const fileInput = document.createElement('input');
            fileInput.type = 'file';
            fileInput.accept = '.json';
            
            fileInput.onchange = (e) => {
                const reader = new FileReader();
                reader.onload = (event) => {
                    if (confirm('ВНИМАНИЕ: Импорт полностью заменит текущую базу данных. Продолжить?')) {
                        socket.emit('admin_import_db', event.target.result);
                    }
                };
                reader.readAsText(e.target.files[0]);
            };
            fileInput.click();
        }

        /**
         * ФИКС: После успешного импорта сервер шлет сигнал всем
         */
        socket.on('admin_db_success', () => {
            alert('Синхронизация базы выполнена. Приложение будет перезагружено.');
            localStorage.clear(); // Очистка старых сессий
            window.location.reload();
        });

        function performLogout() {
            if (confirm('Выйти из профиля?')) {
                localStorage.removeItem('celestra_auth_cache');
                localStorage.removeItem('celestra_active_dialogs');
                window.location.reload();
            }
        }

        // Глобальный перехват ошибок сервера
        socket.on('err', (message) => {
            alert('⚠️ Системное уведомление: ' + message);
        });
    </script>
</body>
</html>
