<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Celestra Core">
    <meta name="theme-color" content="#000000">
    <meta name="format-detection" content="telephone=no">
    <meta name="msapplication-tap-highlight" content="no">
    
    <title>Celestra OS v8.0 — Enterprise Eternal Engine</title>
    
    <style>
        /* --- [1. ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ И ТОКЕНЫ СИСТЕМЫ] --- */
        :root {
            --ios-blue: #007aff;
            --ios-blue-light: #58a6ff;
            --ios-green: #34c759;
            --ios-red: #ff3b30;
            --ios-orange: #ff9500;
            --ios-gray: #8e8e93;
            --ios-bg: #000000;
            --ios-panel: #1c1c1e;
            --ios-secondary-panel: #2c2c2e;
            --ios-text: #ffffff;
            --ios-text-muted: #a1a1a6;
            --border-glow: rgba(0, 122, 255, 0.4);
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
            --glass-blur: blur(40px);
            --transition-main: 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* --- [2. ГЛОБАЛЬНЫЙ СБРОС И БАЗОВЫЕ ПРАВИЛА] --- */
        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            outline: none; 
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-drag: none;
        }

        html, body {
            height: 100%;
            width: 100%;
            background-color: var(--ios-bg);
            color: var(--ios-text);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
            overflow: hidden;
            position: fixed;
            touch-action: none;
            cursor: default;
        }

        /* --- [3. СИСТЕМА АНИМАЦИЙ И ЭФФЕКТОВ] --- */
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.97) translateY(15px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }

        @keyframes pulseGlow {
            0% { box-shadow: 0 0 10px rgba(0, 122, 255, 0.2); }
            50% { box-shadow: 0 0 25px rgba(0, 122, 255, 0.5); }
            100% { box-shadow: 0 0 10px rgba(0, 122, 255, 0.2); }
        }

        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        .fade-in { animation: fadeIn 0.7s cubic-bezier(0.23, 1, 0.32, 1) both; }
        .slide-up { animation: slideUp 0.55s cubic-bezier(0.19, 1, 0.22, 1) both; }

        /* --- [4. ЭКРАН АВТОРИЗАЦИИ: MAXIMUM PERSISTENCE] --- */
        #auth-portal {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle at 50% 50%, #1c1c1e 0%, #000000 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            transition: opacity 0.8s ease-in-out, visibility 0.8s;
        }

        .auth-card {
            width: 88%;
            max-width: 440px;
            text-align: center;
            padding: 20px;
        }

        .brand-logo-large {
            font-size: 92px;
            font-weight: 900;
            letter-spacing: -7px;
            color: var(--ios-blue);
            text-shadow: 0 0 80px rgba(0, 122, 255, 0.7);
            margin-bottom: 60px;
            display: inline-block;
            user-select: none;
            filter: drop-shadow(0 0 10px rgba(0,122,255,0.4));
        }

        .auth-field-group {
            position: relative;
            margin-bottom: 25px;
            width: 100%;
        }

        .ios-input-premium {
            width: 100%;
            padding: 24px 30px;
            background: var(--ios-panel);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 28px;
            color: #fff;
            font-size: 20px;
            font-weight: 500;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.5);
        }

        .ios-input-premium:focus {
            border-color: var(--ios-blue);
            background: var(--ios-secondary-panel);
            box-shadow: 0 0 0 5px rgba(0, 122, 255, 0.18), inset 0 2px 4px rgba(0,0,0,0.5);
            transform: translateY(-2px);
        }

        .ios-btn-main {
            width: 100%;
            padding: 24px;
            border-radius: 28px;
            border: none;
            font-size: 22px;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            background: var(--ios-blue);
            color: #fff;
            box-shadow: 0 18px 45px rgba(0, 122, 255, 0.4);
            margin-top: 20px;
        }

        .ios-btn-main:active { transform: scale(0.94); opacity: 0.9; }

        .ios-btn-ghost {
            background: transparent;
            color: var(--ios-gray);
            margin-top: 30px;
            font-size: 18px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: color 0.3s;
        }

        .ios-btn-ghost:hover { color: var(--ios-text); }

        /* --- [5. ГЛАВНЫЙ ИНТЕРФЕЙС ПРИЛОЖЕНИЯ] --- */
        #app-shell {
            width: 100%;
            height: 100%;
            display: none;
            flex-direction: column;
            opacity: 0;
            transition: opacity 0.8s var(--transition-main);
            background: var(--ios-bg);
        }

        .nav-bar-top {
            height: calc(120px + var(--safe-top));
            padding: var(--safe-top) 25px 0 25px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            z-index: 1000;
            position: relative;
        }

        .user-profile-trigger {
            width: 62px;
            height: 62px;
            border-radius: 50%;
            border: 3px solid var(--ios-blue);
            overflow: hidden;
            background: #222;
            cursor: pointer;
            transition: transform 0.3s;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.5);
        }

        .user-profile-trigger:active { transform: scale(0.9); }
        .user-profile-trigger img { width: 100%; height: 100%; object-fit: cover; }

        .app-title-central { 
            font-size: 38px; 
            font-weight: 900; 
            letter-spacing: -2.5px; 
            background: linear-gradient(180deg, #fff 0%, #aaa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .economy-pill {
            background: var(--ios-green);
            color: #000;
            padding: 12px 24px;
            border-radius: 28px;
            font-weight: 900;
            font-size: 17px;
            box-shadow: 0 10px 30px rgba(52, 199, 89, 0.35);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* --- [6. СПИСОК ЧАТОВ И ПОИСК] --- */
        .search-container {
            padding: 25px;
            background: var(--ios-bg);
        }

        .search-input-field {
            width: 100%;
            background: var(--ios-panel);
            border-radius: 20px;
            border: none;
            padding: 18px 25px;
            color: #fff;
            font-size: 18px;
            font-weight: 500;
        }

        .chats-scroller {
            flex: 1;
            overflow-y: scroll;
            padding-bottom: 140px;
            -webkit-overflow-scrolling: touch;
        }

        .chat-row-item {
            padding: 26px 25px;
            display: flex;
            align-items: center;
            gap: 22px;
            border-bottom: 1px solid rgba(255,255,255,0.03);
            transition: background 0.3s;
            cursor: pointer;
            position: relative;
        }

        .chat-row-item:active { background: var(--ios-panel); }

        .chat-avatar-frame {
            position: relative;
            width: 82px;
            height: 82px;
        }

        .chat-avatar-img { 
            width: 100%; height: 100%; 
            border-radius: 50%; 
            object-fit: cover; 
            background: var(--ios-secondary-panel); 
        }

        .online-status-dot {
            position: absolute;
            bottom: 4px;
            right: 4px;
            width: 20px;
            height: 20px;
            background: var(--ios-green);
            border: 4px solid var(--ios-bg);
            border-radius: 50%;
        }

        .chat-row-body { flex: 1; min-width: 0; }
        .chat-row-body h4 { font-size: 21px; font-weight: 700; margin-bottom: 6px; color: #fff; }
        .chat-row-body p { font-size: 18px; color: var(--ios-gray); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* --- [7. ОКНО ЧАТА: EXECUTIVE FULLSCREEN] --- */
        #chat-overlay {
            position: fixed;
            top: 0; left: 100%; width: 100%; height: 100%;
            background: #000;
            z-index: 5000;
            transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            flex-direction: column;
        }

        #chat-overlay.active { transform: translateX(-100%); }

        .messages-viewport {
            flex: 1;
            padding: 30px 25px;
            display: flex;
            flex-direction: column;
            gap: 22px;
            overflow-y: auto;
            background: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png');
            background-blend-mode: color-burn;
            background-color: #080808;
        }

        .message-bubble {
            max-width: 85%;
            padding: 20px 26px;
            border-radius: 30px;
            font-size: 19px;
            line-height: 1.55;
            position: relative;
            word-wrap: break-word;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            animation: messagePop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes messagePop {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .message-bubble.me {
            background: linear-gradient(135deg, var(--ios-blue) 0%, #0056b3 100%);
            color: #fff;
            align-self: flex-end;
            border-bottom-right-radius: 5px;
        }

        .message-bubble.other {
            background: var(--ios-panel);
            color: #fff;
            align-self: flex-start;
            border-bottom-left-radius: 5px;
        }

        .message-timestamp {
            font-size: 13px;
            opacity: 0.6;
            margin-top: 10px;
            display: block;
            text-align: right;
            font-weight: 600;
        }

        /* --- [8. ПАНЕЛЬ ВВОДА В ЧАТЕ] --- */
        .chat-input-toolbar {
            padding: 20px 25px;
            padding-bottom: calc(20px + var(--safe-bottom));
            background: var(--ios-panel);
            display: flex;
            align-items: center;
            gap: 18px;
            border-top: 1px solid rgba(255,255,255,0.06);
        }

        .toolbar-btn {
            background: none; border: none; font-size: 32px; cursor: pointer; transition: transform 0.2s;
        }
        .toolbar-btn:active { transform: scale(0.85); }

        .chat-main-input {
            flex: 1;
            background: var(--ios-secondary-panel);
            border: none;
            padding: 20px 28px;
            border-radius: 32px;
            color: #fff;
            font-size: 19px;
            font-weight: 500;
        }

        /* --- [9. МОДАЛЬНОЕ ОКНО ПРОФИЛЯ] --- */
        .profile-fullview {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.98);
            backdrop-filter: blur(30px);
            z-index: 9000;
            display: none;
            flex-direction: column;
            align-items: center;
            padding-top: 140px;
        }

        .profile-avatar-big {
            width: 220px; height: 220px;
            border-radius: 50%;
            border: 7px solid var(--ios-blue);
            margin-bottom: 45px;
            object-fit: cover;
            box-shadow: 0 0 70px rgba(0, 122, 255, 0.5);
            animation: pulseGlow 3s infinite;
        }

        .profile-name-title { font-size: 44px; font-weight: 900; margin-bottom: 12px; }
        .profile-id-sub { color: var(--ios-gray); margin-bottom: 60px; font-size: 20px; letter-spacing: 1px; }

        /* --- [10. СИСТЕМНЫЕ ИНДИКАТОРЫ] --- */
        .system-toaster {
            position: fixed;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(40, 40, 40, 0.9);
            padding: 14px 32px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--ios-text-muted);
            pointer-events: none;
            z-index: 15000;
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
        }

        /* --- [11. ИНДИКАТОР ЗАГРУЗКИ] --- */
        .spinner {
            width: 24px; height: 24px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: var(--ios-blue);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

    </style>
</head>
<body>

    <!-- [ФРЕЙМ АВТОРИЗАЦИИ] -->
    <div id="auth-portal">
        <div class="auth-card fade-in">
            <div class="brand-logo-large">CELESTRA</div>
            <div class="auth-field-group">
                <input type="text" id="auth-username" class="ios-input-premium" placeholder="ID Аккаунта" autocomplete="off" autocorrect="off">
            </div>
            <div class="auth-field-group">
                <input type="password" id="auth-password" class="ios-input-premium" placeholder="Мастер-ключ" autocomplete="off">
            </div>
            <button onclick="handleSystemAuth('login')" class="ios-btn-main">
                <span>ВОЙТИ В СИСТЕМУ</span>
                <div id="login-spinner" class="spinner" style="display:none;"></div>
            </button>
            <button onclick="handleSystemAuth('reg')" class="ios-btn-ghost">Создать зашифрованный профиль</button>
        </div>
    </div>

    <!-- [ГЛАВНОЕ ПРИЛОЖЕНИЕ] -->
    <div id="app-shell">
        <header class="nav-bar-top">
            <div class="user-profile-trigger" onclick="openProfileView()">
                <img id="my-avatar-top" src="https://via.placeholder.com/150">
            </div>
            <div class="app-title-central">Celestra</div>
            <div class="economy-pill">
                <span id="my-wallet-val">0</span> 💰
            </div>
        </header>

        <div class="search-container">
            <input type="text" class="search-input-field" placeholder="Поиск по контактам и ID..." oninput="filterChatList(this.value)">
        </div>

        <div id="dialogs-master-list" class="chats-scroller">
            <!-- Сюда вставляются чаты через JS -->
        </div>
    </div>

    <!-- [ОКНО ЧАТА С ПОЛНЫМ ФУНКЦИОНАЛОМ] -->
    <div id="chat-overlay">
        <header class="nav-bar-top">
            <button onclick="closeChatOverlay()" style="background:none; border:none; color:var(--ios-blue); font-size:22px; font-weight:700; cursor:pointer;">Назад</button>
            <div id="active-chat-name" style="font-size:24px; font-weight:900; letter-spacing:-1px;">...</div>
            <div style="width:60px"></div>
        </header>
        
        <div id="messages-scroll-area" class="messages-viewport">
            <!-- Сообщения -->
        </div>

        <div class="chat-input-toolbar">
            <button class="toolbar-btn">📎</button>
            <input type="text" id="chat-input-field" class="chat-main-input" placeholder="Ваше сообщение..." onkeydown="if(event.key==='Enter') dispatchOutgoingMsg()">
            <button onclick="dispatchOutgoingMsg()" class="toolbar-btn">🚀</button>
        </div>
    </div>

    <!-- [ПРОФИЛЬ ПОЛЬЗОВАТЕЛЯ] -->
    <div id="modal-profile-view" class="profile-fullview slide-up">
        <img id="profile-big-ava" src="" class="profile-avatar-big">
        <h2 id="profile-big-name" class="profile-name-title"></h2>
        <p id="profile-big-id" class="profile-id-sub"></p>
        
        <div style="width:88%; max-width:380px; display:flex; flex-direction:column; gap:15px;">
            <button onclick="closeProfileView()" class="ios-btn-main" style="background:#222; box-shadow:none;">ВЕРНУТЬСЯ</button>
            <button onclick="executeSystemLogout()" class="ios-btn-ghost" style="color:var(--ios-red); font-size:20px;">ВЫЙТИ ИЗ АККАУНТА</button>
        </div>
        <p style="margin-top:auto; padding-bottom:60px; color:#444; font-size:15px; font-weight:800; letter-spacing:3px;">SECURITY CORE v8.0.1 ALPHA</p>
    </div>

    <div id="global-system-toaster" class="system-toaster">Система готова</div>

    <!-- [ЛОГИКА SENIOR DEV: MAXIMUM REDUNDANCY] -->
    <script src="/socket.io/socket.io.js"></script>
    <script>
        /**
         * @license Celestra Enterprise
         * @author Senior AI Architecture
         * Описание: Реализация системы с гарантированной персистентностью данных.
         */

        const socket = io({
            reconnection: true,
            reconnectionAttempts: Infinity,
            reconnectionDelay: 1000,
            reconnectionDelayMax: 5000,
            timeout: 25000
        });

        // --- СОСТОЯНИЕ ПРИЛОЖЕНИЯ (STATE MANAGEMENT) ---
        const APP_STATE = {
            currentUser: null,
            activeChatPeer: null,
            dataStore: {
                messages: {}, // { username: [msg_objects] }
                profiles: {}, // { username: { nick, ava } }
                registry: []  // Список ID активных диалогов
            },
            isInitialLoad: true
        };

        // --- ССЫЛКИ НА DOM-ЭЛЕМЕНТЫ ---
        const ELEMENTS = {
            auth: document.getElementById('auth-portal'),
            app: document.getElementById('app-shell'),
            chat: document.getElementById('chat-overlay'),
            feed: document.getElementById('messages-scroll-area'),
            list: document.getElementById('dialogs-master-list'),
            toast: document.getElementById('global-system-toaster'),
            input: document.getElementById('chat-input-field')
        };

        // --- 1. СИСТЕМА ВОССТАНОВЛЕНИЯ СЕССИИ (PERSISTENCE LAYER) ---
        
        function bootSystem() {
            const secureVault = localStorage.getItem('_celestra_enterprise_vault');
            if (secureVault) {
                try {
                    const decrypted = JSON.parse(atob(secureVault));
                    updateSystemStatus("Восстановление сессии...");
                    socket.emit('auth', { 
                        login: decrypted.u, 
                        password: decrypted.p, 
                        type: 'login' 
                    });
                } catch(err) {
                    console.error("Vault Corruption:", err);
                    localStorage.removeItem('_celestra_enterprise_vault');
                }
            }
        }

        window.addEventListener('DOMContentLoaded', bootSystem);

        // --- 2. ОБРАБОТКА АВТОРИЗАЦИИ ---

        function handleSystemAuth(mode) {
            const u = document.getElementById('auth-username').value.trim().toLowerCase();
            const p = document.getElementById('auth-password').value.trim();
            
            if (!u || !p) {
                showToast("Заполните все поля", "error");
                return;
            }

            document.getElementById('login-spinner').style.display = 'block';
            updateSystemStatus("Синхронизация...");

            // Жесткое кэширование данных перед отправкой для исключения потерь
            const sessionKey = btoa(JSON.stringify({ u: u, p: p }));
            localStorage.setItem('_celestra_enterprise_vault', sessionKey);

            socket.emit('auth', { login: u, password: p, type: mode });
        }

        socket.on('auth_ok', (userData) => {
            APP_STATE.currentUser = userData;
            
            // Плавный переход интерфейса
            ELEMENTS.auth.style.opacity = '0';
            setTimeout(() => {
                ELEMENTS.auth.style.display = 'none';
                ELEMENTS.app.style.display = 'flex';
                setTimeout(() => ELEMENTS.app.style.opacity = '1', 50);
            }, 800);

            // Обновление UI данными пользователя
            document.getElementById('my-avatar-top').src = userData.prof.ava;
            document.getElementById('my-wallet-val').innerText = userData.econ.coins;

            // Восстановление реестра чатов из локального хранилища
            const savedRegistry = JSON.parse(localStorage.getItem('_celestra_chat_registry') || "[]");
            APP_STATE.dataStore.registry = savedRegistry;
            
            savedRegistry.forEach(peerId => {
                socket.emit('get_h', peerId);
            });

            updateSystemStatus("Online");
            showToast("Доступ разрешен", "success");
        });

        socket.on('auth_err', (errorMessage) => {
            document.getElementById('login-spinner').style.display = 'none';
            alert("Ошибка входа: " + errorMessage);
            localStorage.removeItem('_celestra_enterprise_vault');
            updateSystemStatus("Access Denied");
        });

        // --- 3. ДВИЖОК СООБЩЕНИЙ (MESSAGE ENGINE) ---

        function dispatchOutgoingMsg() {
            const text = ELEMENTS.input.value.trim();
            if (!text || !APP_STATE.activeChatPeer) return;

            const payload = {
                to: APP_STATE.activeChatPeer,
                txt: text,
                type: 'text',
                timestamp: Date.now()
            };

            socket.emit('msg', payload);
            ELEMENTS.input.value = '';
            
            // Тактильный фидбек для мобильных (если поддерживается)
            if (window.navigator.vibrate) window.navigator.vibrate(10);
        }

        socket.on('receive', (incoming) => {
            // Определяем, кто является собеседником в данном пакете данных
            const peerId = (incoming.msg.f === APP_STATE.currentUser.un) ? incoming.room : incoming.msg.f;
            
            // Инициализация хранилища для этого чата
            if (!APP_STATE.dataStore.messages[peerId]) {
                APP_STATE.dataStore.messages[peerId] = [];
            }
            
            // Добавление сообщения в кэш
            APP_STATE.dataStore.messages[peerId].push(incoming.msg);
            
            // Обновление кэша профиля собеседника
            if (incoming.senderProf) {
                APP_STATE.dataStore.profiles[peerId] = incoming.senderProf;
            }

            // Синхронизация реестра
            syncRegistry(peerId);

            // Если чат открыт в данный момент — рендерим сообщение
            if (APP_STATE.activeChatPeer === peerId) {
                renderMessagesToViewport();
            }

            // В любом случае обновляем главный список
            refreshChatListUI();
        });

        socket.on('h_res', (response) => {
            APP_STATE.dataStore.messages[response.target] = response.msgs;
            APP_STATE.dataStore.profiles[response.target] = response.prof;
            
            if (APP_STATE.activeChatPeer === response.target) {
                renderMessagesToViewport();
            }
            refreshChatListUI();
        });

        // --- 4. ОРИСОВКА ИНТЕРФЕЙСА (DOM RENDERING) ---

        function refreshChatListUI() {
            ELEMENTS.list.innerHTML = '';
            
            // Сортируем чаты по времени последнего сообщения
            const sortedPeers = Object.keys(APP_STATE.dataStore.messages).sort((a, b) => {
                const msgsA = APP_STATE.dataStore.messages[a];
                const msgsB = APP_STATE.dataStore.messages[b];
                const lastA = msgsA[msgsA.length - 1]?.time || 0;
                const lastB = msgsB[msgsB.length - 1]?.time || 0;
                return lastB.localeCompare(lastA);
            });

            sortedPeers.forEach(peerId => {
                const profile = APP_STATE.dataStore.profiles[peerId] || { nick: peerId, ava: '' };
                const history = APP_STATE.dataStore.messages[peerId];
                const lastMsg = history[history.length - 1];

                const row = document.createElement('div');
                row.className = 'chat-row-item fade-in';
                row.onclick = () => openChatOverlay(peerId);
                
                row.innerHTML = `
                    <div class="chat-avatar-frame">
                        <img src="${profile.ava}" class="chat-avatar-img">
                        <div class="online-status-dot"></div>
                    </div>
                    <div class="chat-row-body">
                        <h4>${profile.nick}</h4>
                        <p>${lastMsg ? lastMsg.txt : 'История пуста'}</p>
                    </div>
                    <div style="font-size:12px; color:var(--ios-gray);">${lastMsg ? lastMsg.time : ''}</div>
                `;
                ELEMENTS.list.appendChild(row);
            });
        }

        function renderMessagesToViewport() {
            ELEMENTS.feed.innerHTML = '';
            const messageStack = APP_STATE.dataStore.messages[APP_STATE.activeChatPeer] || [];
            
            messageStack.forEach(msg => {
                const isMe = (msg.f === APP_STATE.currentUser.un);
                const bubble = document.createElement('div');
                bubble.className = `message-bubble ${isMe ? 'me' : 'other'}`;
                
                bubble.innerHTML = `
                    <div class="text-content">${msg.txt}</div>
                    <span class="message-timestamp">${msg.time}</span>
                `;
                ELEMENTS.feed.appendChild(bubble);
            });
            
            // Скролл вниз с плавной прокруткой
            ELEMENTS.feed.scrollTo({
                top: ELEMENTS.feed.scrollHeight,
                behavior: 'smooth'
            });
        }

        // --- 5. НАВИГАЦИЯ И МОДАЛЬНЫЕ ОКНА ---

        function openChatOverlay(peerId) {
            APP_STATE.activeChatPeer = peerId;
            const profile = APP_STATE.dataStore.profiles[peerId] || { nick: peerId };
            
            document.getElementById('active-chat-name').innerText = profile.nick;
            ELEMENTS.chat.classList.add('active');
            
            // Принудительно запрашиваем свежую историю при входе
            socket.emit('get_h', peerId);
            renderMessagesToViewport();
        }

        function closeChatOverlay() {
            APP_STATE.activeChatPeer = null;
            ELEMENTS.chat.classList.remove('active');
        }

        function openProfileView() {
            const modal = document.getElementById('modal-profile-view');
            const user = APP_STATE.currentUser;
            
            document.getElementById('profile-big-ava').src = user.prof.ava;
            document.getElementById('profile-big-name').innerText = user.prof.nick;
            document.getElementById('profile-big-id').innerText = '@' + user.un;
            
            modal.style.display = 'flex';
        }

        function closeProfileView() {
            document.getElementById('modal-profile-view').style.display = 'none';
        }

        // --- 6. ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ (UTILS) ---

        function syncRegistry(id) {
            let reg = JSON.parse(localStorage.getItem('_celestra_chat_registry') || "[]");
            if (!reg.includes(id)) {
                reg.push(id);
                localStorage.setItem('_celestra_chat_registry', JSON.stringify(reg));
            }
        }

        function executeSystemLogout() {
            if (confirm("ВНИМАНИЕ: Все локальные данные и сессия будут безвозвратно удалены. Продолжить?")) {
                localStorage.clear();
                window.location.reload();
            }
        }

        function updateSystemStatus(text) {
            ELEMENTS.toast.innerText = text;
        }

        function showToast(text, type) {
            const originalText = ELEMENTS.toast.innerText;
            ELEMENTS.toast.innerText = text;
            ELEMENTS.toast.style.color = (type === 'error') ? 'var(--ios-red)' : 'var(--ios-green)';
            
            setTimeout(() => {
                ELEMENTS.toast.innerText = originalText;
                ELEMENTS.toast.style.color = 'var(--ios-text-muted)';
            }, 3000);
        }

        function filterChatList(query) {
            const q = query.toLowerCase();
            const rows = document.querySelectorAll('.chat-row-item');
            
            rows.forEach(row => {
                const name = row.querySelector('h4').innerText.toLowerCase();
                if (name.includes(q)) {
                    row.style.display = 'flex';
                } else {
                    row.style.display = 'none';
                }
            });
        }

        // --- 7. ОБРАБОТКА ЖИЗНЕННОГО ЦИКЛА СОЕДИНЕНИЯ ---

        socket.on('connect', () => {
            updateSystemStatus("Online");
            if (APP_STATE.currentUser) {
                // Если мы уже были залогинены, перепроверяем статус
                socket.emit('auth', { 
                    login: APP_STATE.currentUser.un, 
                    type: 'check' 
                });
            }
        });

        socket.on('disconnect', () => {
            updateSystemStatus("Connecting...");
            showToast("Связь потеряна", "error");
        });

    </script>
</body>
</html>
