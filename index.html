<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>Celestra</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="auth-screen" class="full-page flex-center">
        <div class="auth-box">
            <h1 class="brand">CELESTRA</h1>
            <input type="text" id="auth-l" placeholder="Логин">
            <input type="password" id="auth-p" placeholder="Пароль">
            <button onclick="doAuth('login')" class="btn-primary">ВОЙТИ</button>
            <button onclick="doAuth('reg')" class="btn-link">Создать аккаунт</button>
        </div>
    </div>

    <div id="app" style="display:none">
        
        <section id="list-view" class="page active">
            <header class="header">
                <span class="logo-small">Celestra</span>
                <button onclick="openSet()" class="btn-icon">⚙️</button>
            </header>
            
            <div class="search-bar">
                <input type="text" id="s-in" placeholder="Поиск @юзера..." oninput="doSearch()">
                <div id="s-res" class="search-results"></div>
            </div>

            <div id="chat-items" class="content"></div>
        </section>

        <section id="chat-view" class="page">
            <header class="header">
                <button onclick="closeChat()" class="btn-back">⬅</button>
                <div class="chat-info" onclick="viewP()">
                    <b id="h-nick">...</b>
                    <small id="h-status">загрузка</small>
                </div>
            </header>
            
            <div id="chat-win" class="content messages"></div>

            <footer class="input-area">
                <div id="typing"></div>
                <div class="row">
                    <input type="text" id="m-in" placeholder="Сообщение..." onkeydown="if(event.key==='Enter') send()">
                    <button onclick="send()" class="btn-send">🚀</button>
                </div>
            </footer>
        </section>
    </div>

    <div id="modal-p" class="modal" style="display:none" onclick="this.style.display='none'">
        <div class="modal-card" onclick="event.stopPropagation()">
            <img id="v-ava" src="" class="big-ava">
            <h2 id="v-nick"></h2>
            <p id="v-ls" class="status-txt"></p>
            <p id="v-bio" class="bio-txt"></p>
            <div class="coin-box">💰 <span id="v-c">0</span></div>
            <button onclick="document.getElementById('modal-p').style.display='none'" class="btn-close">Закрыть</button>
        </div>
    </div>

    <div id="modal-s" class="modal" style="display:none">
        <div class="modal-card">
            <h3>Настройки</h3>
            <input id="set-n" placeholder="Новый ник">
            <input id="set-a" placeholder="URL аватарки (GIF)">
            <textarea id="set-b" placeholder="О себе..."></textarea>
            <button onclick="saveSet()" class="btn-primary">Сохранить</button>
            <button onclick="logout()" class="btn-danger">Выйти</button>
            <button onclick="document.getElementById('modal-s').style.display='none'" class="btn-link">Отмена</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let me = "", cur = null, chatData = {}, profs = {}, typeT;

        window.onload = () => {
            const creds = localStorage.getItem('cel_v3');
            if(creds) {
                const {l, p} = JSON.parse(creds);
                socket.emit('auth', { login: l, password: p, type: 'login' });
            }
        };

        function doAuth(type) {
            const l = document.getElementById('auth-l').value, p = document.getElementById('auth-p').value;
            if(!l || !p) return;
            localStorage.setItem('cel_v3', JSON.stringify({l, p}));
            socket.emit('auth', { login: l, password: p, type });
        }

        socket.on('auth_ok', d => {
            me = d.un;
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('app').style.display = 'block';
            updateUI();
        });

        socket.on('err', m => {
            alert(m);
            localStorage.removeItem('cel_v3');
        });

        function doSearch() {
            const val = document.getElementById('s-in').value;
            socket.emit('search_user', val);
        }

        socket.on('search_res', res => {
            const box = document.getElementById('s-res'); box.innerHTML = '';
            if(res.length > 0) {
                box.style.display = 'block';
                res.forEach(u => {
                    if(u.login === me) return;
                    const d = document.createElement('div');
                    d.className = 'search-item';
                    d.innerHTML = `<img src="${u.ava}"> <span>${u.nick} (@${u.login})</span>`;
                    d.onclick = () => { 
                        if(!chatData[u.login]) chatData[u.login] = []; // Инициализируем пустой чат
                        openChat(u.login); 
                        box.style.display = 'none'; 
                        document.getElementById('s-in').value = ''; 
                    };
                    box.appendChild(d);
                });
            } else { box.style.display = 'none'; }
        });

        function openChat(u) {
            cur = u;
            socket.emit('get_h', u);
            document.getElementById('chat-view').classList.add('active');
        }

        function closeChat() {
            cur = null;
            document.getElementById('chat-view').classList.remove('active');
            updateUI();
        }

        socket.on('h_res', d => {
            chatData[d.target] = d.msgs;
            profs[d.target] = d.prof;
            document.getElementById('h-nick').textContent = d.prof.nick;
            const s = document.getElementById('h-status');
            s.textContent = d.prof.ls === 'Online' ? 'в сети' : 'был(а) в ' + d.prof.ls;
            s.style.color = d.prof.ls === 'Online' ? '#3ba55d' : '#888';
            renderMsgs();
        });

        function renderMsgs() {
            const win = document.getElementById('chat-win'); win.innerHTML = '';
            (chatData[cur]||[]).forEach(m => {
                const isMe = m.f === me;
                win.innerHTML += `<div class="msg-row ${isMe?'me':'ot'}"><div class="bubble">${m.txt}<small>${m.time}</small></div></div>`;
            });
            win.scrollTop = win.scrollHeight;
        }

        function send() {
            const i = document.getElementById('m-in');
            if(!i.value.trim() || !cur) return;
            socket.emit('msg', { to: cur, txt: i.value });
            i.value = '';
        }

        socket.on('receive', d => {
            const room = d.msg.f === me ? d.room : d.msg.f;
            if(!chatData[room]) chatData[room] = [];
            chatData[room].push(d.msg);
            if(room === cur) renderMsgs();
            updateUI();
        });

        function updateUI() {
            const list = document.getElementById('chat-items'); list.innerHTML = '';
            const sortedChats = Object.keys(chatData).reverse(); // Новые сверху
            sortedChats.forEach(u => {
                const last = chatData[u][chatData[u].length - 1];
                const p = profs[u] || { nick: u };
                list.innerHTML += `
                    <div class="chat-row" onclick="openChat('${u}')">
                        <div class="row-info">
                            <b>${p.nick}</b>
                            <p>${last ? last.txt : 'Начните переписку...'}</p>
                        </div>
                    </div>
                `;
            });
        }

        function viewP() {
            const p = profs[cur]; if(!p) return;
            document.getElementById('v-ava').src = p.ava;
            document.getElementById('v-nick').textContent = p.nick;
            document.getElementById('v-ls').textContent = p.ls === 'Online' ? 'Онлайн' : 'Был(а) в ' + p.ls;
            document.getElementById('v-bio').textContent = p.bio || "Bio пуст";
            document.getElementById('v-c').textContent = p.coins || 0;
            document.getElementById('modal-p').style.display = 'flex';
        }

        function openSet() { document.getElementById('modal-s').style.display='flex'; }
        function saveSet() {
            socket.emit('update_prof', {
                nick: document.getElementById('set-n').value,
                ava: document.getElementById('set-a').value,
                bio: document.getElementById('set-b').value
            });
            document.getElementById('modal-s').style.display='none';
        }

        function logout() { localStorage.removeItem('cel_v3'); location.reload(); }

        document.getElementById('m-in').oninput = () => socket.emit('typing', cur);
        socket.on('is_typing', d => {
            if(d.f === cur) {
                document.getElementById('typing').textContent = 'печатает...';
                clearTimeout(typeT);
                typeT = setTimeout(() => document.getElementById('typing').textContent = '', 2000);
            }
        });
    </script>
</body>
</html>
