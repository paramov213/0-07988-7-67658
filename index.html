<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <title>Celestra Web</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="auth-screen" class="overlay">
        <div class="card">
            <h1>CELESTRA</h1>
            <input type="text" id="auth-l" placeholder="Логин">
            <input type="password" id="auth-p" placeholder="Пароль">
            <button onclick="doAuth('login')" class="btn-p">Войти</button>
            <button onclick="doAuth('reg')" class="btn-s">Создать аккаунт</button>
        </div>
    </div>

    <div id="app" class="main-grid" style="display:none">
        <aside class="side">
            <div class="search"><input type="text" placeholder="Поиск @юзера..." oninput="searchUser(this.value)"></div>
            <div id="chat-list" class="scroll"></div>
            <div class="me-footer" onclick="openSettings()">⚙️ Настройки</div>
        </aside>

        <main class="chat">
            <header id="chat-head" onclick="viewProfile()"></header>
            <div id="chat-win" class="scroll"></div>
            <footer class="input-zone">
                <div id="typer" class="typer-label"></div>
                <div class="row">
                    <input type="text" id="m-in" placeholder="Сообщение..." onkeydown="handleInput(event)">
                    <button onclick="sendMsg()">➡️</button>
                </div>
            </footer>
        </main>
    </div>

    <div id="modal-set" class="modal" style="display:none">
        <div class="card">
            <h2>Профиль</h2>
            <input id="set-n" placeholder="Никнейм">
            <input id="set-a" placeholder="Ссылка на GIF аватарку">
            <textarea id="set-b" placeholder="Описание профиля"></textarea>
            <button onclick="saveSet()" class="btn-p">Сохранить</button>
            <button onclick="closeModal('modal-set')" class="btn-s">Закрыть</button>
        </div>
    </div>

    <div id="modal-view" class="modal" style="display:none" onclick="closeModal('modal-view')">
        <div class="card profile-card" onclick="event.stopPropagation()">
            <img id="v-ava" src="">
            <h2 id="v-nick"></h2>
            <p id="v-ls" class="status"></p>
            <p id="v-bio"></p>
            <div class="coins">💰 Баланс: <span id="v-coins">0</span></div>
            <button onclick="closeModal('modal-view')" class="btn-s">Назад</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let me = "", cur = "global", data = {}, profs = {}, tyT;

        function doAuth(type) {
            socket.emit('auth', { login: auth-l.value, password: auth-p.value, type });
        }

        socket.on('auth_ok', d => {
            me = d.un;
            auth-screen.style.display = 'none';
            app.style.display = 'grid';
            openChat('global');
        });

        socket.on('err', m => alert(m));
        socket.on('lockdown', () => location.reload());

        function openChat(target) {
            cur = target;
            socket.emit('get_h', target);
            updateList();
        }

        socket.on('h_res', d => {
            data[d.target] = d.msgs;
            profs[d.target] = d.prof;
            renderChat(d.target);
            updateHeader(d.prof, d.target);
        });

        function updateHeader(p, target) {
            const st = p.ls === "Online" ? '<span class="on">Online</span>' : `был в ${p.ls}`;
            document.getElementById('chat-head').innerHTML = `
                <b>${p.nick}</b><br><small>${target==='global'?'Общий чат':st}</small>
            `;
        }

        function renderChat(target) {
            const win = document.getElementById('chat-win');
            win.innerHTML = '';
            (data[target]||[]).forEach(m => {
                const isMe = m.f === me;
                const div = document.createElement('div');
                div.className = `msg ${isMe ? 'me' : 'other'}`;
                
                // Радужный эффект
                const items = m.e?.items || [];
                const isRain = items.some(i => i.value === 'rainbow');
                const isGold = items.some(i => i.value === 'gold');
                let clr = isGold ? 'gold' : 'white';

                div.innerHTML = `
                    <span class="${isRain?'rainbow':''}" style="color:${clr};cursor:pointer" onclick="openFriend('${m.f}')">
                        ${m.p?.nick || m.f}
                    </span>: ${m.txt} <small>${m.time}</small>
                `;
                win.appendChild(div);
            });
            win.scrollTop = win.scrollHeight;
        }

        function sendMsg() {
            const inp = document.getElementById('m-in');
            if (inp.value.trim()) {
                socket.emit('msg', { to: cur, txt: inp.value });
                inp.value = '';
            }
        }

        socket.on('receive', d => {
            const room = (d.room === 'global') ? 'global' : (d.msg.f === me ? d.room : d.msg.f);
            if (!data[room]) data[room] = [];
            data[room].push(d.msg);
            if (room === cur) renderChat(room);
            else updateList();
        });

        function openSettings() { document.getElementById('modal-set').style.display='flex'; }
        function saveSet() {
            socket.emit('update_prof', { nick: set-n.value, ava: set-a.value, bio: set-b.value });
            closeModal('modal-set');
        }

        function openFriend(u) {
            if(['global','shict','system'].includes(u)) return;
            socket.emit('get_h', u);
            setTimeout(() => {
                const p = profs[u];
                v-ava.src = p.ava; v-nick.textContent = p.nick;
                v-ls.textContent = p.ls === 'Online' ? 'В сети' : 'Был в сети: '+p.ls;
                v-bio.textContent = p.bio; v-coins.textContent = p.coins;
                document.getElementById('modal-view').style.display='flex';
            }, 200);
        }

        function handleInput(e) { if(e.key==='Enter') sendMsg(); socket.emit('typing', cur); }
        socket.on('is_typing', d => {
            if(d.f === cur) {
                typer.textContent = "...печатает";
                clearTimeout(tyT); tyT = setTimeout(()=>typer.textContent='', 2000);
            }
        });

        function updateList() { /* Логика списка чатов */ }
        function closeModal(id) { document.getElementById(id).style.display='none'; }
    </script>
</body>
</html>
