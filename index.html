<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nitro Messenger</title>
    <link rel="stylesheet" href="style.css">
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>

    <!-- Экран загрузки и автовхода -->
    <div id="loading-screen" class="screen">
        <div class="loader-box">
            <div class="spinner"></div>
            <p>Проверка сессии...</p>
        </div>
    </div>

    <!-- Экран авторизации -->
    <div id="auth-screen" class="screen hidden">
        <div class="auth-card">
            <h2 id="auth-header">С возвращением!</h2>
            <p id="auth-subheader" class="subtitle">Мы так рады видеть вас снова!</p>
            
            <div class="input-group">
                <label>ИМЯ ПОЛЬЗОВАТЕЛЯ</label>
                <input type="text" id="auth-username" spellcheck="false">
            </div>
            
            <div class="input-group">
                <label>ПАРОЛЬ</label>
                <input type="password" id="auth-password">
            </div>
            
            <button id="auth-submit-btn">Вход</button>
            
            <p class="auth-footer">
                <span id="auth-footer-text">Нужен аккаунт?</span> 
                <span id="auth-toggle-link">Зарегистрироваться</span>
            </p>
        </div>
    </div>

    <!-- Главный экран приложения -->
    <div id="app-screen" class="screen hidden">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="profile-preview" id="open-profile-settings">
                    <img src="" id="user-avatar-top" alt="Avatar">
                    <div class="status-dot online"></div>
                </div>
                <div class="search-container">
                    <input type="text" id="user-search-input" placeholder="Найти друга...">
                </div>
            </div>
            <div id="chat-list" class="chat-list-container">
                <!-- Сюда динамически добавляются активные контакты -->
            </div>
        </aside>

        <main class="chat-window">
            <header id="chat-header" class="chat-header hidden">
                <div class="active-user-info">
                    <h3 id="current-chat-name">Имя пользователя</h3>
                    <span id="current-chat-status" class="status-indicator">в сети</span>
                </div>
            </header>
            
            <div id="messages-display" class="messages-display">
                <div class="welcome-screen">
                    <h3>Добро пожаловать в Nitro</h3>
                    <p>Выберите собеседника, чтобы начать общение.</p>
                </div>
            </div>
            
            <footer id="chat-input-area" class="chat-input-area hidden">
                <div class="input-bar-wrapper">
                    <input type="text" id="message-input-field" placeholder="Написать сообщение...">
                    <button id="send-msg-btn">➤</button>
                </div>
            </footer>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
