<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="style.css">
    <title>Celestra Discord</title>
</head>
<body>
    <div id="auth-screen" class="auth-container">
        <div class="discord-login-card">
            <h2>С возвращением!</h2>
            <p>Мы так рады вас видеть!</p>
            <div class="input-group">
                <label>ЛОГИН</label>
                <input type="text" id="login-input">
            </div>
            <div class="input-group">
                <label>ПАРОЛЬ</label>
                <input type="password" id="pass-input">
            </div>
            <button onclick="auth('login')" class="main-btn">Вход</button>
            <button onclick="auth('register')" class="link-btn">Нужна учетная запись? Зарегистрироваться</button>
        </div>
    </div>

    <div id="app-container" class="discord-layout" style="display: none;">
        <nav class="guilds-nav">
            <div class="guild-icon active">C</div>
            <div class="separator"></div>
            <div class="guild-icon plus">+</div>
        </nav>

        <aside class="channels-sidebar" id="sidebar">
            <div class="sidebar-header">Celestra Chat</div>
            <div class="channels-scroll">
                <div class="category">ЛИЧНЫЕ СООБЩЕНИЯ</div>
                <div id="chats-list"></div>
            </div>
            <div class="user-panel">
                <img id="my-avatar-btn" src="" onclick="openSettings()" class="user-avatar">
                <div class="user-info">
                    <div id="user-display-name">User</div>
                    <div class="user-tag">#0001</div>
                </div>
                <div class="user-controls">⚙️</div>
            </div>
        </aside>

        <main class="chat-main" id="chat-area">
            <header class="chat-header">
                <span class="at-symbol">@</span>
                <span id="header-user">Выберите собеседника</span>
            </header>
            <div id="chat-window"></div>
            <div class="input-container" id="input-block" style="display: none;">
                <div class="input-wrapper">
                    <label class="attach-btn">+<input type="file" id="photo-input" onchange="sendPhoto()" hidden></label>
                    <input type="text" id="msg" placeholder="Написать..." onkeydown="if(event.key==='Enter') sendPrivate()">
                </div>
            </div>
        </main>
    </div>

    <div id="settings-modal" class="modal-overlay" style="display:none;" onclick="if(event.target==this)this.style.display='none'">
        <div class="discord-modal">
            <h3>Настройки профиля</h3>
            <div class="profile-edit-box">
                <div class="avatar-circle-wrapper" onclick="document.getElementById('avatar-upload').click()">
                    <img id="edit-avatar-preview" src="">
                    <div class="hover-overlay">ИЗМЕНИТЬ</div>
                    <input type="file" id="avatar-upload" hidden onchange="previewMyAvatar(this)">
                </div>
                <input type="text" id="edit-name" placeholder="Отображаемое имя">
                <textarea id="edit-bio" placeholder="О себе..."></textarea>
            </div>
            <div class="modal-footer">
                <button onclick="saveProfile()" class="main-btn">Сохранить</button>
                <button onclick="logout()" class="danger-btn">Выйти</button>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let myName = "", currentChatUser = null, chatMessages = {};

        window.onload = () => {
            const saved = localStorage.getItem('c_creds');
            if(saved) socket.emit('auth', {...JSON.parse(saved), type: 'login'});
        };

        function auth(type) {
            const login = document.getElementById('login-input').value;
            const password = document.getElementById('pass-input').value;
            localStorage.setItem('c_creds', JSON.stringify({login, password}));
            socket.emit('auth', {login, password, type});
        }

        socket.on('auth-success', data => {
            myName = data.user;
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('app-container').style.display = 'flex';
            document.getElementById('my-avatar-btn').src = data.profile.avatar || 'https://cdn0.iconfinder.com/data/icons/social-messaging-ui-color-shapes-3/3/51-512.png';
            document.getElementById('user-display-name').innerText = data.profile.displayName;
            
            if(data.history) {
                data.history.forEach(m => {
                    const p = m.from === myName ? m.to : m.from;
                    if(!chatMessages[p]) chatMessages[p] = [];
                    chatMessages[p].push(m);
                });
                updateChatsUI();
            }
        });

        function openChat(u) {
            currentChatUser = u;
            document.getElementById('header-user').innerText = u;
            document.getElementById('input-block').style.display = 'block';
            renderMessages(u);
            updateChatsUI();
        }

        function renderMessages(u) {
            const win = document.getElementById('chat-window'); win.innerHTML = '';
            (chatMessages[u] || []).forEach(m => {
                const div = document.createElement('div');
                div.className = 'd-message';
                div.innerHTML = `<div class="msg-content">
                    <span class="msg-author">${m.from}</span>
                    <span class="msg-time">${m.time}</span>
                    <div class="msg-text">${m.text || ''}</div>
                    ${m.image ? `<img src="${m.image}" class="msg-img">` : ''}
                </div>`;
                win.appendChild(div);
            });
            win.scrollTop = win.scrollHeight;
        }

        function updateChatsUI() {
            const list = document.getElementById('chats-list'); list.innerHTML = '';
            Object.keys(chatMessages).forEach(u => {
                const div = document.createElement('div');
                div.className = `channel-item ${currentChatUser === u ? 'active' : ''}`;
                div.onclick = () => openChat(u);
                div.innerHTML = `<span class="at">@</span> ${u}`;
                list.appendChild(div);
            });
        }

        socket.on('msg-receive', m => {
            const p = m.from === myName ? m.to : m.from;
            if(!chatMessages[p]) chatMessages[p] = [];
            chatMessages[p].push(m);
            if(p === currentChatUser) renderMessages(p);
            updateChatsUI();
        });

        function sendPrivate() {
            const t = document.getElementById('msg').value;
            if(t.trim() && currentChatUser) {
                socket.emit('private-message', {to: currentChatUser, text: t});
                document.getElementById('msg').value = '';
            }
        }
        
        function sendPhoto() {
            const f = document.getElementById('photo-input').files[0];
            if(f && currentChatUser) {
                const r = new FileReader();
                r.onload = e => socket.emit('private-message', { to: currentChatUser, text: "", image: e.target.result });
                r.readAsDataURL(f);
            }
        }

        function openSettings() {
            document.getElementById('edit-avatar-preview').src = document.getElementById('my-avatar-btn').src;
            document.getElementById('settings-modal').style.display = 'flex';
        }

        function previewMyAvatar(i) {
            if(i.files[0]) {
                const r = new FileReader();
                r.onload = e => document.getElementById('edit-avatar-preview').src = e.target.result;
                r.readAsDataURL(i.files[0]);
            }
        }

        function saveProfile() {
            const avatar = document.getElementById('edit-avatar-preview').src;
            const displayName = document.getElementById('edit-name').value;
            socket.emit('update-profile', {avatar, displayName});
            document.getElementById('settings-modal').style.display = 'none';
        }

        socket.on('profile-updated', d => {
            document.getElementById('my-avatar-btn').src = d.avatar;
            document.getElementById('user-display-name').innerText = d.displayName;
        });

        function logout() { localStorage.removeItem('c_creds'); location.reload(); }
    </script>
</body>
</html>
