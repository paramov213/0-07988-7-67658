<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BROKE | P2P МЕССЕНДЖЕР</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
</head>
<body>

    <div id="ban-screen" class="hidden-overlay">
        <div class="glass popup-center">
            <h1 style="color: #ff3b30;">ДОСТУП ЗАБЛОКИРОВАН</h1>
            <p>Ваш ID внесен в черный список.</p>
        </div>
    </div>

    <div id="auth-modal" class="modal-overlay">
        <div class="modal-content glass">
            <h2 class="neon-text">BROKE NETWORK</h2>
            <div id="auth-options">
                <button onclick="showRegisterForm()" class="btn-prem">СОЗДАТЬ ЛИЧНОСТЬ</button>
                <button onclick="showLoginForm()">ВОЙТИ ПО ID</button>
            </div>
            
            <div id="register-form" class="hidden">
                <input type="text" id="reg-name" placeholder="Введите ваше имя">
                <button onclick="doRegister()">СОЗДАТЬ И ВОЙТИ</button>
            </div>

            <div id="login-form" class="hidden">
                <input type="text" id="login-id" placeholder="Ваш Peer ID">
                <button onclick="doLogin()">ПОДКЛЮЧИТЬСЯ</button>
            </div>
        </div>
    </div>

    <div id="admin-modal" class="modal-overlay hidden">
        <div class="modal-content glass">
            <h2>АДМИНИСТРАТОР</h2>
            <input type="text" id="adm-log" placeholder="Логин">
            <input type="password" id="adm-pass" placeholder="Пароль">
            <button onclick="submitAdminAuth()">ВОЙТИ В ПАНЕЛЬ</button>
            <button onclick="closeAdminModal()" style="background:none; font-size:12px;">Отмена</button>
        </div>
    </div>

    <div id="app" class="app-container hidden">
        <aside class="sidebar glass">
            <div class="user-profile">
                <div id="user-badge" class="badge" onclick="openAdminModal()">ПОЛЬЗОВАТЕЛЬ</div>
                <h3 id="display-name-ui">Аноним</h3>
                <code id="my-id-display" onclick="copyMyID()">ID: Загрузка...</code>
            </div>

            <div class="admin-panel hidden" id="admin-controls">
                <h3 style="color:var(--gold)">КОНТРОЛЬ</h3>
                <input type="text" id="target-id" placeholder="ID цели">
                <div class="admin-btns">
                    <button class="btn-ban" onclick="execAdmin('CMD_BAN')">БАН</button>
                    <button class="btn-prem" onclick="execAdmin('CMD_GIVE_PREMIUM')">PREM</button>
                    <button class="btn-purge" onclick="execAdmin('REMOTE_PURGE')">PURGE</button>
                </div>
            </div>

            <div class="contacts">
                <input type="text" id="dest-id" placeholder="ID партнера">
                <button onclick="startConnection()">ПОДКЛЮЧИТЬСЯ</button>
            </div>

            <div id="premium-tools" class="ghost-tools hidden">
                <h3>GHOST ИНСТРУМЕНТЫ</h3>
                <button onclick="fakeHistory()">ФЕЙК ИСТОРИЯ</button>
                <select id="self-destruct" class="glass">
                    <option value="0">Без удаления</option>
                    <option value="5000">5 секунд</option>
                    <option value="30000">30 секунд</option>
                </select>
            </div>

            <button onclick="exitApp()" class="btn-logout">ВЫХОД</button>
        </aside>

        <main class="chat-area glass">
            <header class="chat-header">
                <div id="chat-title">Ожидание...</div>
                <button onclick="makeCall()" id="call-btn">📹</button>
            </header>
            <div id="messages"></div>
            <footer class="chat-input">
                <input type="text" id="msg-input" placeholder="Сообщение...">
                <button onclick="sendMsg()">ОТПРАВИТЬ</button>
            </footer>
        </main>
    </div>

    <div id="call-screen" class="hidden-overlay glass">
        <video id="remote-v" autoplay playsinline></video>
        <div class="local-v-box"><video id="local-v" autoplay playsinline muted></video></div>
        <div class="call-controls-box">
            <div id="call-info">Входящий вызов...</div>
            <div class="call-btns">
                <button onclick="acceptCall()" style="background:var(--green)">ОТВЕТИТЬ</button>
                <button onclick="rejectCall()" style="background:var(--red)">СБРОСИТЬ</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
