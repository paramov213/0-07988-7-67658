<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Celestra</title>
</head>
<body>
    <div id="auth-screen" class="modal">
        <div class="glass-card animate-fade">
            <h1>CELESTRA</h1>
            <input type="text" id="login-input" placeholder="Логин">
            <input type="password" id="pass-input" placeholder="Пароль">
            <button onclick="auth('login')">Войти</button>
            <button onclick="auth('register')" class="secondary">Регистрация</button>
        </div>
    </div>

    <div id="app-container" class="app-container" style="display: none;">
        <aside class="sidebar">
            <div class="sidebar-header">
                <img id="my-avatar-btn" src="" onclick="openSettings()">
                <div class="search-section">
                    <input type="text" id="user-search" placeholder="Поиск..." oninput="searchUser()">
                    <div id="search-results"></div>
                </div>
            </div>
            <div id="chats-list"></div>
        </aside>

        <main class="chat-area">
            <header id="chat-header" onclick="viewProfile()">
                <div id="header-user">Выберите чат</div>
                <div id="header-status"></div>
            </header>
            <div id="chat-window"></div>
            <div class="input-area" id="input-block" style="display: none;">
                <label class="icon-btn">📷<input type="file" id="photo-input" onchange="sendPhoto()" hidden></label>
                <input type="text" id="msg" placeholder="Сообщение..." onkeydown="checkEnter(event)">
                <button onclick="sendPrivate()" class="send-btn">➤</button>
            </div>
        </main>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let myName = "", currentChatUser = null;
        let chatMessages = {}; // Здесь храним историю по пользователям
        let unreadCounts = {};

        // 1. Отправка по Enter
        function checkEnter(e) {
            if (e.key === "Enter") {
                sendPrivate();
            }
        }

        function auth(type) {
            const login = document.getElementById('login-input').value.trim();
            const pass = document.getElementById('pass-input').value;
            socket.emit('auth', { login, password: pass, type });
        }

        socket.on('auth-success', data => {
            myName = data.user;
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('app-container').style.display = 'flex';
            
            // Восстановление истории и списка чатов
            if (data.history) {
                data.history.forEach(msg => {
                    const partner = msg.from === myName ? msg.to : msg.from;
                    if (!chatMessages[partner]) chatMessages[partner] = [];
                    chatMessages[partner].push(msg);
                    if (!unreadCounts.hasOwnProperty(partner)) unreadCounts[partner] = 0;
                });
                updateChatsUI();
            }
        });

        function searchUser() {
            const val = document.getElementById('user-search').value;
            if(val.length >= 1) socket.emit('search-user', val);
        }

        socket.on('search-result', data => {
            if (data.exists && data.username !== myName) {
                document.getElementById('search-results').innerHTML = 
                `<div class="search-item" onclick="openChat('${data.username}')">@${data.username}</div>`;
            }
        });

        function openChat(user) {
            currentChatUser = user;
            unreadCounts[user] = 0;
            document.getElementById('header-user').innerText = "@" + user;
            document.getElementById('input-block').style.display = 'flex';
            document.getElementById('search-results').innerHTML = '';
            renderMessages(user);
            updateChatsUI();
            socket.emit('get-status', user);
        }

        function renderMessages(user) {
            const win = document.getElementById('chat-window');
            win.innerHTML = '';
            (chatMessages[user] || []).forEach(msg => {
                const div = document.createElement('div');
                div.className = `msg-bubble ${msg.from === myName ? 'my-msg' : ''}`;
                div.innerHTML = `${msg.text || ''} ${msg.image ? `<img src="${msg.image}" class="chat-img">` : ''} 
                                 <div class="msg-time">${msg.time}</div>`;
                win.appendChild(div);
            });
            win.scrollTop = win.scrollHeight;
        }

        function updateChatsUI() {
            const list = document.getElementById('chats-list');
            list.innerHTML = '';
            Object.keys(chatMessages).forEach(user => {
                const div = document.createElement('div');
                div.className = `chat-item ${currentChatUser === user ? 'active' : ''}`;
                div.onclick = () => openChat(user);
                let badge = unreadCounts[user] > 0 ? `<span class="badge">${unreadCounts[user]}</span>` : '';
                div.innerHTML = `<span>@${user}</span> ${badge}`;
                list.appendChild(div);
            });
        }

        socket.on('msg-receive', msg => {
            const partner = msg.from === myName ? msg.to : msg.from;
            if (!chatMessages[partner]) chatMessages[partner] = [];
            chatMessages[partner].push(msg);
            
            if (partner !== currentChatUser && msg.from !== myName) {
                unreadCounts[partner] = (unreadCounts[partner] || 0) + 1;
            }
            if (partner === currentChatUser) renderMessages(partner);
            updateChatsUI();
        });

        function sendPrivate() {
            const val = document.getElementById('msg').value;
            if (val.trim() && currentChatUser) {
                socket.emit('private-message', { to: currentChatUser, text: val });
                document.getElementById('msg').value = '';
            }
        }
        
        function sendPhoto() {
            const f = document.getElementById('photo-input').files[0];
            if(f) {
                const r = new FileReader();
                r.onload = e => socket.emit('private-message', { to: currentChatUser, text: "", image: e.target.result });
                r.readAsDataURL(f);
            }
        }
    </script>
</body>
</html>
