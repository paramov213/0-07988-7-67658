<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Celestra Messenger</title>
</head>
<body>
    <div id="auth-screen" class="modal">
        <div class="auth-box">
            <h1>CELESTRA</h1>
            <input type="text" id="login-input" placeholder="Логин">
            <input type="password" id="pass-input" placeholder="Пароль">
            <div class="auth-buttons">
                <button onclick="auth('login')">Войти</button>
                <button onclick="auth('register')" class="secondary">Регистрация</button>
            </div>
            <p id="error-msg"></p>
        </div>
    </div>

    <div id="app-container" class="app-container" style="display: none;">
        <aside class="sidebar">
            <div class="search-section">
                <input type="text" id="user-search" placeholder="Поиск @Георгий..." oninput="searchUser()">
                <div id="search-results"></div>
            </div>
            <div class="sidebar-footer"><span id="my-name"></span> <button onclick="logout()">Выход</button></div>
        </aside>

        <main class="chat-area">
            <header id="chat-header">
                <div id="header-user">Выберите чат</div>
                <div id="header-status"></div>
            </header>
            <div id="chat-window"></div>
            <div class="input-area" id="input-block" style="display: none;">
                <label class="icon-btn">📷<input type="file" id="photo-input" hidden></label>
                <input type="text" id="msg" placeholder="Сообщение..." oninput="isTyping()">
                <button onclick="sendPrivate()" class="send-btn">➤</button>
            </div>
        </main>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let myName = "", currentChatUser = null, typingTimeout;

        function auth(type) {
            const login = document.getElementById('login-input').value.trim();
            const pass = document.getElementById('pass-input').value;
            localStorage.setItem('celestra_session', JSON.stringify({login, password: pass}));
            socket.emit('auth', { login, password: pass, type });
        }

        socket.on('auth-success', (data) => {
            myName = data.user;
            document.getElementById('my-name').innerText = "@" + myName;
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('app-container').style.display = 'flex';
        });

        // Поиск: теперь он "умный"
        function searchUser() {
            const val = document.getElementById('user-search').value;
            if(val.length >= 1) socket.emit('search-user', val);
            else document.getElementById('search-results').innerHTML = '';
        }

        socket.on('search-result', (data) => {
            const res = document.getElementById('search-results');
            if (data.exists) {
                res.innerHTML = `<div class="found-user-card" onclick="openChat('${data.username}')">
                    <b>@${data.username}</b><br><small>${data.status}</small>
                </div>`;
            } else {
                res.innerHTML = `<div class="not-found">Пользователь не найден</div>`;
            }
        });

        function openChat(user) {
            currentChatUser = user;
            document.getElementById('header-user').innerText = "@" + user;
            document.getElementById('input-block').style.display = 'flex';
            document.getElementById('chat-window').innerHTML = '';
            socket.emit('get-status', user);
        }

        // Логика "Печатает..."
        function isTyping() {
            socket.emit('typing', { to: currentChatUser });
        }

        socket.on('user-typing', (data) => {
            if(data.from === currentChatUser) {
                const status = document.getElementById('header-status');
                const oldStatus = status.innerText;
                status.innerText = "печатает...";
                clearTimeout(typingTimeout);
                typingTimeout = setTimeout(() => { status.innerText = oldStatus; }, 2000);
            }
        });

        function sendPrivate() {
            const text = document.getElementById('msg').value;
            if (text.trim()) socket.emit('private-message', { to: currentChatUser, text });
            document.getElementById('msg').value = '';
        }

        socket.on('msg-receive', (data) => {
            if (data.from === currentChatUser || data.from === myName) {
                const div = document.createElement('div');
                div.className = `msg-bubble ${data.from === myName ? 'my-msg' : ''}`;
                div.innerHTML = `<div>${data.text}</div><div class="msg-time">${data.time}</div>`;
                document.getElementById('chat-window').appendChild(div);
                document.getElementById('chat-window').scrollTop = document.getElementById('chat-window').scrollHeight;
            }
        });

        function logout() { localStorage.clear(); location.reload(); }
    </script>
</body>
</html>
