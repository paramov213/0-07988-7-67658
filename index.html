<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="style.css">
    <title>Celestra Premium</title>
</head>
<body>
    <div id="auth-screen" class="auth-wrapper">
        <div class="glass-login animate-pop">
            <h1 class="logo-text">CELESTRA</h1>
            <p>Добро пожаловать в яркое будущее</p>
            <input type="text" id="login-input" placeholder="Ваш логин">
            <input type="password" id="pass-input" placeholder="Ваш пароль">
            <p id="error-msg" class="error-txt"></p>
            <button onclick="auth('login')" class="neon-btn">ВОЙТИ</button>
            <button onclick="auth('register')" class="ghost-btn">Создать аккаунт</button>
        </div>
    </div>

    <div id="app-container" class="main-layout" style="display: none;">
        <aside class="sidebar">
            <div class="search-bar">
                <input type="text" id="user-search" placeholder="Поиск @юзера..." oninput="doSearch()">
                <div id="search-results"></div>
            </div>
            <div id="chats-list" class="scrollable"></div>
            <div class="my-profile-mini">
                <img id="my-avatar-btn" src="" onclick="openSettings()" class="mini-ava">
                <span id="my-name-display">Загрузка...</span>
                <button class="settings-gear" onclick="openSettings()">⚙️</button>
            </div>
        </aside>

        <main class="chat-area">
            <header class="chat-top">
                <div id="current-contact">Выберите чат</div>
            </header>
            <div id="chat-window" class="scrollable"></div>
            <div class="input-container" id="input-block" style="display:none;">
                <div class="input-glass">
                    <label class="btn-img">📷<input type="file" id="photo-input" onchange="sendPhoto()" hidden></label>
                    <input type="text" id="msg" placeholder="Напишите что-нибудь..." onkeydown="if(event.key==='Enter') sendPrivate()">
                    <button onclick="sendPrivate()" class="send-arr">➤</button>
                </div>
            </div>
        </main>
    </div>

    <div id="settings-modal" class="overlay" style="display:none;" onclick="if(event.target==this)this.style.display='none'">
        <div class="modal-card animate-pop">
            <div class="ava-edit-circle" onclick="document.getElementById('avatar-upload').click()">
                <img id="edit-avatar-preview" src="">
                <input type="file" id="avatar-upload" hidden onchange="previewAva(this)">
            </div>
            <input type="text" id="edit-name" placeholder="Никнейм">
            <button onclick="saveProfile()" class="neon-btn">Сохранить</button>
            <button onclick="logout()" class="danger-btn">Выйти</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let myName = "", currentChatUser = null, chatMessages = {};

        // === ЛОГИКА АВТО-ВХОДА ===
        window.onload = () => {
            const savedCreds = localStorage.getItem('celestra_creds');
            if (savedCreds) {
                const data = JSON.parse(savedCreds);
                // Скрываем форму, пока идет проверка на сервере
                document.getElementById('auth-screen').style.opacity = '0';
                socket.emit('auth', { login: data.login, password: data.password, type: 'login' });
            }
        };

        function auth(type) {
            const login = document.getElementById('login-input').value;
            const password = document.getElementById('pass-input').value;
            if(!login || !password) return;
            
            // Сохраняем данные в браузере
            localStorage.setItem('celestra_creds', JSON.stringify({ login, password }));
            socket.emit('auth', { login, password, type });
        }

        socket.on('auth-success', data => {
            myName = data.user;
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('app-container').style.display = 'flex';
            document.getElementById('my-avatar-btn').src = data.profile.avatar || 'https://cdn-icons-png.flaticon.com/512/149/149071.png';
            document.getElementById('my-name-display').innerText = data.profile.displayName;
            
            if(data.history) {
                data.history.forEach(m => {
                    const p = m.from === myName ? m.to : m.from;
                    if(!chatMessages[p]) chatMessages[p] = [];
                    chatMessages[p].push(m);
                });
                updateChatsUI();
            }
        });

        socket.on('auth-error', msg => { 
            document.getElementById('error-msg').innerText = msg;
            // Если авто-вход не удался, показываем форму снова и чистим память
            document.getElementById('auth-screen').style.opacity = '1';
            localStorage.removeItem('celestra_creds');
        });

        // === ФУНКЦИЯ ВЫХОДА ===
        function logout() {
            localStorage.removeItem('celestra_creds'); // Стираем сохраненные данные
            location.reload(); // Перезагружаем страницу
        }

        // === ОСТАЛЬНАЯ ЛОГИКА ЧАТА (НЕ МЕНЯЛАСЬ) ===
        function doSearch() {
            const v = document.getElementById('user-search').value;
            if(v.length > 1) socket.emit('search-user', v);
        }

        socket.on('search-result', d => {
            const res = document.getElementById('search-results');
            if(d.exists && d.username !== myName) {
                res.innerHTML = `<div class="search-res-item" onclick="openChat('${d.username}')">@${d.username}</div>`;
            }
        });

        function openChat(u) {
            currentChatUser = u;
            document.getElementById('current-contact').innerText = "@" + u;
            document.getElementById('input-block').style.display = 'block';
            document.getElementById('search-results').innerHTML = '';
            document.getElementById('user-search').value = '';
            renderMsgs(u);
            updateChatsUI();
        }

        function renderMsgs(u) {
            const win = WIN = document.getElementById('chat-window'); win.innerHTML = '';
            (chatMessages[u] || []).forEach(m => {
                const div = document.createElement('div');
                div.className = `msg ${m.from === myName ? 'me' : 'them'}`;
                div.innerHTML = `<div class="msg-bubble">${m.text || ''} ${m.image ? `<img src="${m.image}">` : ''}</div><div class="m-time">${m.time}</div>`;
                win.appendChild(div);
            });
            win.scrollTop = win.scrollHeight;
        }

        function updateChatsUI() {
            const list = document.getElementById('chats-list'); list.innerHTML = '';
            Object.keys(chatMessages).forEach(u => {
                const div = document.createElement('div');
                div.className = `chat-tab ${currentChatUser === u ? 'active' : ''}`;
                div.onclick = () => openChat(u);
                div.innerText = u;
                list.appendChild(div);
            });
        }

        socket.on('msg-receive', m => {
            const p = m.from === myName ? m.to : m.from;
            if (m.from === myName || m.to === myName) {
                if(!chatMessages[p]) chatMessages[p] = [];
                chatMessages[p].push(m);
                if(p === currentChatUser) renderMsgs(p);
                updateChatsUI();
            }
        });

        function sendPrivate() {
            const v = document.getElementById('msg').value;
            if(v.trim() && currentChatUser) {
                socket.emit('private-message', {to: currentChatUser, text: v});
                document.getElementById('msg').value = '';
            }
        }

        function sendPhoto() {
            const f = document.getElementById('photo-input').files[0];
            if(f && currentChatUser) {
                const r = new FileReader();
                r.onload = e => socket.emit('private-message', {to: currentChatUser, text: "", image: e.target.result});
                r.readAsDataURL(f);
            }
        }

        function openSettings() {
            document.getElementById('edit-avatar-preview').src = document.getElementById('my-avatar-btn').src;
            document.getElementById('settings-modal').style.display = 'flex';
        }

        function previewAva(i) {
            if(i.files[0]) {
                const r = new FileReader();
                r.onload = e => document.getElementById('edit-avatar-preview').src = e.target.result;
                r.readAsDataURL(i.files[0]);
            }
        }

        function saveProfile() {
            const avatar = document.getElementById('edit-avatar-preview').src;
            const displayName = document.getElementById('edit-name').value;
            socket.emit('update-profile', {avatar, displayName});
            document.getElementById('settings-modal').style.display = 'none';
        }

        socket.on('profile-updated', d => {
            document.getElementById('my-avatar-btn').src = d.avatar;
            document.getElementById('my-name-display').innerText = d.displayName;
        });
    </script>
</body>
</html>
