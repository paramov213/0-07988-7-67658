<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link rel="stylesheet" href="style.css">
    <title>Celestra</title>
</head>
<body>
    <div id="auth-screen" class="modal">
        <div class="auth-box">
            <h1>CELESTRA</h1>
            <input type="text" id="login-input" placeholder="Логин">
            <input type="password" id="pass-input" placeholder="Пароль">
            <button onclick="auth('login')">Войти</button>
            <button onclick="auth('register')" class="secondary">Регистрация</button>
        </div>
    </div>

    <div id="app-container" class="app-container" style="display: none;">
        <aside class="sidebar" id="sidebar">
            <div class="search-section">
                <input type="text" id="user-search" placeholder="Поиск @юзер..." oninput="searchUser()">
                <div id="search-results"></div>
            </div>
            <div id="chats-list"></div>
            <div class="sidebar-footer">
                <span id="my-name"></span>
                <button onclick="logout()" class="exit-btn">Выход</button>
            </div>
        </aside>

        <main class="chat-area" id="chat-area">
            <header id="chat-header">
                <button class="back-btn" onclick="toggleMobile(true)">←</button>
                <div class="header-text">
                    <div id="header-user">Чат</div>
                    <div id="header-status"></div>
                </div>
            </header>
            <div id="chat-window"></div>
            <div class="input-area" id="input-block" style="display: none;">
                <label class="icon-btn">📷<input type="file" id="photo-input" accept="image/*" onchange="sendPhoto()" hidden></label>
                <input type="text" id="msg" placeholder="Сообщение..." autocomplete="off">
                <button onclick="sendPrivate()" class="send-btn">➤</button>
            </div>
        </main>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let myName = "", currentChatUser = null;
        const chatMessages = {}; 
        const unreadCounts = {};

        // ФИКС ВЫСОТЫ ДЛЯ МОБИЛОК
        function fixVH() {
            let vh = window.innerHeight * 0.01;
            document.documentElement.style.setProperty('--vh', `${vh}px`);
        }
        window.addEventListener('resize', fixVH);
        fixVH();

        function auth(type) {
            const login = document.getElementById('login-input').value.trim();
            const pass = document.getElementById('pass-input').value;
            localStorage.setItem('celestra_session', JSON.stringify({login, password: pass}));
            socket.emit('auth', { login, password: pass, type });
        }

        socket.on('auth-success', (data) => {
            myName = data.user;
            document.getElementById('my-name').innerText = "@" + myName;
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('app-container').style.display = 'flex';
            fixVH();
        });

        function searchUser() {
            const val = document.getElementById('user-search').value;
            if(val.length >= 1) socket.emit('search-user', val);
        }

        socket.on('search-result', (data) => {
            const res = document.getElementById('search-results');
            if (data.exists && data.username !== myName) {
                res.innerHTML = `<div class="found-user-card" onclick="openChat('${data.username}')"><b>@${data.username}</b></div>`;
            }
        });

        function openChat(user) {
            currentChatUser = user;
            unreadCounts[user] = 0;
            document.getElementById('header-user').innerText = "@" + user;
            document.getElementById('input-block').style.display = 'flex';
            toggleMobile(false);
            socket.emit('get-history', user);
            updateChatsUI();
        }

        socket.on('chat-history', data => {
            chatMessages[data.partner] = data.msgs;
            renderMessages(data.partner);
        });

        function sendPrivate() {
            const el = document.getElementById('msg');
            if (el.value.trim()) {
                socket.emit('private-message', { to: currentChatUser, text: el.value });
                el.value = '';
            }
        }

        function sendPhoto() {
            const input = document.getElementById('photo-input');
            if (input.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    socket.emit('private-message', { to: currentChatUser, image: e.target.result });
                    input.value = '';
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        socket.on('msg-receive', (data) => {
            const partner = data.from === myName ? data.to : data.from;
            if (!chatMessages[partner]) chatMessages[partner] = [];
            chatMessages[partner].push(data);
            if (partner !== currentChatUser && data.from !== myName) unreadCounts[partner] = (unreadCounts[partner] || 0) + 1;
            if (partner === currentChatUser) renderMessages(partner);
            updateChatsUI();
        });

        function renderMessages(user) {
            const win = document.getElementById('chat-window');
            win.innerHTML = '';
            (chatMessages[user] || []).forEach(msg => {
                const div = document.createElement('div');
                div.className = `msg-bubble ${msg.from === myName ? 'my-msg' : ''}`;
                let content = msg.text ? `<div>${msg.text}</div>` : "";
                if(msg.image) content += `<img src="${msg.image}" class="chat-img" onload="this.parentElement.parentElement.scrollTop = this.parentElement.parentElement.scrollHeight">`;
                div.innerHTML = `${content}<div class="msg-time">${msg.time}</div>`;
                win.appendChild(div);
            });
            win.scrollTop = win.scrollHeight;
        }

        function toggleMobile(showSide) {
            if (window.innerWidth <= 768) {
                document.getElementById('sidebar').style.display = showSide ? 'flex' : 'none';
                document.getElementById('chat-area').style.display = showSide ? 'none' : 'flex';
                fixVH();
            }
        }

        function updateChatsUI() {
            const list = document.getElementById('chats-list');
            list.innerHTML = '';
            Object.keys(chatMessages).forEach(user => {
                const div = document.createElement('div');
                div.className = `chat-item ${currentChatUser === user ? 'active' : ''}`;
                div.onclick = () => openChat(user);
                let badge = unreadCounts[user] > 0 ? `<span class="badge">${unreadCounts[user]}</span>` : '';
                div.innerHTML = `<span>@${user}</span> ${badge}`;
                list.appendChild(div);
            });
        }

        function logout() { localStorage.clear(); location.reload(); }
    </script>
</body>
</html>
