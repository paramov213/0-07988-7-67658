<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Celestra Core">
    <meta name="theme-color" content="#000000">
    <meta name="format-detection" content="telephone=no">
    <meta name="msapplication-tap-highlight" content="no">
    
    <title>Celestra OS v10.0 — Pure Communication Engine</title>
    
    <style>
        /* --- [1. СИСТЕМНЫЕ ПЕРЕМЕННЫЕ (DESIGN TOKENS)] --- */
        :root {
            --ios-blue: #007aff;
            --ios-blue-light: #58a6ff;
            --ios-green: #34c759;
            --ios-red: #ff3b30;
            --ios-gray: #8e8e93;
            --ios-bg: #000000;
            --ios-panel: #1c1c1e;
            --ios-secondary-panel: #2c2c2e;
            --ios-text: #ffffff;
            --ios-text-muted: #a1a1a6;
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
            --glass-blur: blur(50px);
            --transition-speed: 0.5s;
            --transition-curve: cubic-bezier(0.16, 1, 0.3, 1);
            --border-radius-main: 28px;
            --shadow-main: 0 15px 45px rgba(0, 0, 0, 0.5);
        }

        /* --- [2. ГЛОБАЛЬНЫЙ СБРОС (CSS RESET)] --- */
        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            outline: none; 
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-touch-callout: none;
        }

        html, body {
            height: 100%;
            width: 100%;
            background-color: var(--ios-bg);
            color: var(--ios-text);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
            overflow: hidden;
            position: fixed;
            touch-action: none;
        }

        /* --- [3. СИСТЕМА АНИМАЦИЙ (ANIMATION ENGINE)] --- */
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.96) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }

        @keyframes messagePop {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        @keyframes spinnerRotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .fade-in { animation: fadeIn 0.8s var(--transition-curve) both; }
        .slide-up { animation: slideUp 0.6s var(--transition-curve) both; }
        .msg-anim { animation: messagePop 0.4s var(--transition-curve) both; }

        /* --- [4. ЭКРАН АВТОРИЗАЦИИ (AUTH MODULE)] --- */
        #auth-portal {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle at center, #2c2c2e 0%, #000000 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            transition: opacity 0.8s ease, visibility 0.8s;
        }

        .auth-card {
            width: 90%;
            max-width: 440px;
            padding: 40px;
            text-align: center;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: var(--shadow-main);
        }

        .brand-header {
            font-size: 88px;
            font-weight: 900;
            letter-spacing: -7px;
            color: var(--ios-blue);
            text-shadow: 0 0 70px rgba(0, 122, 255, 0.6);
            margin-bottom: 45px;
            user-select: none;
        }

        .input-group {
            position: relative;
            margin-bottom: 25px;
            width: 100%;
        }

        .ios-input-field {
            width: 100%;
            padding: 24px 30px;
            background: var(--ios-panel);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 25px;
            color: #ffffff;
            font-size: 20px;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .ios-input-field:focus {
            border-color: var(--ios-blue);
            background: var(--ios-secondary-panel);
            box-shadow: 0 0 0 4px rgba(0, 122, 255, 0.2);
        }

        .btn-primary {
            width: 100%;
            padding: 24px;
            border-radius: 25px;
            border: none;
            background: var(--ios-blue);
            color: #ffffff;
            font-size: 22px;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 15px 35px rgba(0, 122, 255, 0.4);
            margin-top: 15px;
        }

        .btn-primary:active { transform: scale(0.95); opacity: 0.9; }

        .btn-ghost-action {
            width: 100%;
            background: transparent;
            border: none;
            color: var(--ios-gray);
            font-size: 18px;
            font-weight: 600;
            margin-top: 30px;
            cursor: pointer;
            transition: color 0.3s;
        }

        .btn-ghost-action:hover { color: #ffffff; }

        /* --- [5. ГЛАВНОЕ ПРИЛОЖЕНИЕ (APPLICATION SHELL)] --- */
        #app-shell {
            width: 100%;
            height: 100%;
            display: none;
            flex-direction: column;
            opacity: 0;
            transition: opacity 0.8s var(--transition-curve);
        }

        .header-navigation {
            height: calc(110px + var(--safe-top));
            padding: var(--safe-top) 25px 0 25px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(18, 18, 18, 0.85);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            z-index: 1000;
        }

        .avatar-container {
            width: 58px;
            height: 58px;
            border-radius: 50%;
            border: 3px solid var(--ios-blue);
            padding: 2px;
            cursor: pointer;
            transition: transform 0.3s;
        }

        .avatar-container:active { transform: scale(0.9); }

        .avatar-container img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            background: #222;
        }

        .app-title {
            font-size: 34px;
            font-weight: 900;
            letter-spacing: -2px;
            color: #ffffff;
        }

        .search-module {
            padding: 20px 25px;
            background: var(--ios-bg);
        }

        .search-bar {
            width: 100%;
            padding: 18px 25px;
            background: var(--ios-panel);
            border-radius: 20px;
            border: none;
            color: #ffffff;
            font-size: 18px;
            font-weight: 500;
        }

        /* --- [6. СПИСОК ЧАТОВ (DIALOG LIST)] --- */
        .dialogs-viewport {
            flex: 1;
            overflow-y: scroll;
            padding-bottom: 120px;
            -webkit-overflow-scrolling: touch;
        }

        .dialog-item-row {
            padding: 24px 25px;
            display: flex;
            align-items: center;
            gap: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            cursor: pointer;
            transition: background 0.2s;
        }

        .dialog-item-row:active { background: var(--ios-panel); }

        .dialog-avatar-frame {
            position: relative;
            width: 76px;
            height: 76px;
            flex-shrink: 0;
        }

        .dialog-avatar-frame img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            background: var(--ios-secondary-panel);
        }

        .online-dot {
            position: absolute;
            bottom: 4px;
            right: 4px;
            width: 18px;
            height: 18px;
            background: var(--ios-green);
            border: 3px solid #000000;
            border-radius: 50%;
        }

        .dialog-body-content {
            flex: 1;
            min-width: 0;
        }

        .dialog-body-content h4 {
            font-size: 21px;
            font-weight: 700;
            margin-bottom: 6px;
            color: #ffffff;
        }

        .dialog-body-content p {
            font-size: 17px;
            color: var(--ios-gray);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-weight: 400;
        }

        /* --- [7. ОКНО ЧАТА (EXECUTIVE MESSAGING OVERLAY)] --- */
        #chat-window-overlay {
            position: fixed;
            top: 0;
            left: 100%;
            width: 100%;
            height: 100%;
            background: #000000;
            z-index: 5000;
            display: flex;
            flex-direction: column;
            transition: transform 0.5s var(--transition-curve);
        }

        #chat-window-overlay.is-visible { transform: translateX(-100%); }

        .chat-header {
            height: calc(110px + var(--safe-top));
            padding: var(--safe-top) 25px 0 25px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(20, 20, 20, 0.9);
            backdrop-filter: var(--glass-blur);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .back-button {
            background: none;
            border: none;
            color: var(--ios-blue);
            font-size: 20px;
            font-weight: 700;
            cursor: pointer;
            padding: 10px 0;
        }

        .messages-scroll-box {
            flex: 1;
            padding: 30px 25px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 22px;
            background: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png');
            background-blend-mode: overlay;
            background-color: #080808;
            -webkit-overflow-scrolling: touch;
        }

        .message-bubble {
            max-width: 82%;
            padding: 18px 24px;
            border-radius: 28px;
            font-size: 19px;
            line-height: 1.5;
            position: relative;
            word-wrap: break-word;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .message-bubble.is-me {
            background: linear-gradient(135deg, var(--ios-blue) 0%, #0056b3 100%);
            color: #ffffff;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .message-bubble.is-other {
            background: var(--ios-panel);
            color: #ffffff;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .message-meta {
            font-size: 12px;
            opacity: 0.6;
            margin-top: 10px;
            display: block;
            text-align: right;
            font-weight: 600;
        }

        /* --- [8. ПАНЕЛЬ ВВОДА (INPUT CONTROLLER)] --- */
        .input-panel-wrapper {
            padding: 20px 25px;
            padding-bottom: calc(20px + var(--safe-bottom));
            background: var(--ios-panel);
            display: flex;
            align-items: center;
            gap: 15px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .text-input-field {
            flex: 1;
            background: var(--ios-secondary-panel);
            border: none;
            padding: 18px 26px;
            border-radius: 30px;
            color: #ffffff;
            font-size: 19px;
            font-weight: 500;
        }

        .send-button-icon {
            background: none;
            border: none;
            font-size: 32px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .send-button-icon:active { transform: scale(0.85); }

        /* --- [9. МОДАЛЬНОЕ ОКНО ПРОФИЛЯ (PROFILE CONTROLLER)] --- */
        .profile-modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.98);
            backdrop-filter: blur(35px);
            z-index: 9000;
            display: none;
            flex-direction: column;
            align-items: center;
            padding-top: 120px;
        }

        .profile-avatar-giant {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            border: 6px solid var(--ios-blue);
            margin-bottom: 40px;
            object-fit: cover;
            box-shadow: 0 0 60px rgba(0, 122, 255, 0.4);
        }

        .profile-username-text { font-size: 42px; font-weight: 900; margin-bottom: 10px; }
        .profile-id-subtext { color: var(--ios-gray); margin-bottom: 50px; font-size: 20px; }

        /* --- [10. СИСТЕМНЫЙ ЛОГ (STATUS MONITOR)] --- */
        .system-status-indicator {
            position: fixed;
            bottom: 45px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.1);
            padding: 12px 28px;
            border-radius: 35px;
            font-size: 13px;
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--ios-gray);
            pointer-events: none;
            z-index: 15000;
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
        }

    </style>
</head>
<body>

    <!-- [AUTH PORTAL LAYER] -->
    <div id="auth-portal">
        <div class="auth-card fade-in">
            <div class="brand-header">CELESTRA</div>
            <div class="input-group">
                <input type="text" id="id-input-field" class="ios-input-field" placeholder="ID Аккаунта" autocomplete="off" autocorrect="off">
            </div>
            <div class="input-group">
                <input type="password" id="key-input-field" class="ios-input-field" placeholder="Секретный ключ">
            </div>
            <button onclick="handleAuthAction('login')" class="btn-primary">ВХОД В СИСТЕМУ</button>
            <button onclick="handleAuthAction('reg')" class="btn-ghost-action">Создать новую зашифрованную личность</button>
        </div>
    </div>

    <!-- [MAIN APPLICATION CORE LAYER] -->
    <div id="app-shell">
        <header class="header-navigation">
            <div class="avatar-container" onclick="openProfileController()">
                <img id="my-profile-avatar" src="">
            </div>
            <div class="app-title">Celestra</div>
            <div style="width: 58px;"></div>
        </header>

        <div class="search-module">
            <input type="text" class="search-bar" placeholder="Поиск по контактам..." oninput="filterDialogList(this.value)">
        </div>

        <div id="dialogs-list-root" class="dialogs-viewport">
            <!-- Динамический рендеринг чатов -->
        </div>
    </div>

    <!-- [CHAT OVERLAY LAYER] -->
    <div id="chat-window-overlay">
        <header class="chat-header">
            <button onclick="closeChatController()" class="back-button">Назад</button>
            <div id="active-peer-display-name" style="font-size: 22px; font-weight: 800;">Загрузка...</div>
            <div style="width: 60px;"></div>
        </header>
        
        <div id="messages-display-feed" class="messages-scroll-box">
            <!-- Динамический рендеринг сообщений -->
        </div>

        <div class="input-panel-wrapper">
            <button class="send-button-icon">📎</button>
            <input type="text" id="main-chat-input" class="text-input-field" placeholder="Cообщение..." onkeydown="if(event.key==='Enter') executeMessageDispatch()">
            <button onclick="executeMessageDispatch()" class="send-button-icon">🚀</button>
        </div>
    </div>

    <!-- [PROFILE MODAL LAYER] -->
    <div id="profile-modal-controller" class="profile-modal-overlay slide-up">
        <img id="profile-modal-avatar" src="" class="profile-avatar-giant">
        <h2 id="profile-modal-nick" class="profile-username-text">...</h2>
        <p id="profile-modal-id" class="profile-id-subtext">@id000000</p>
        
        <div style="width: 85%; max-width: 360px;">
            <button onclick="closeProfileController()" class="btn-primary" style="background: #2c2c2e; box-shadow: none;">ЗАКРЫТЬ ПРОФИЛЬ</button>
            <button onclick="executeSystemLogout()" class="btn-ghost-action" style="color: var(--ios-red); font-size: 20px; font-weight: 800;">ВЫЙТИ ИЗ СИСТЕМЫ</button>
        </div>
        <p style="margin-top: auto; padding-bottom: 50px; color: #333; font-size: 14px; font-weight: 800;">SECURITY CORE v10.0.4 ABSOLUTE</p>
    </div>

    <!-- [STATUS BAR] -->
    <div id="system-status-text" class="system-status-indicator">Ready</div>

    <!-- [SYSTEM SCRIPTS - LOGIC MONOLITH] -->
    <script src="/socket.io/socket.io.js"></script>
    <script>
        /**
         * @file Celestra Core Monolith
         * @version 10.0 Enterprise
         * @description Полная реализация мессенджера с персистентным хранилищем.
         */

        const socket = io({
            reconnection: true,
            reconnectionAttempts: Infinity,
            reconnectionDelay: 1000,
            timeout: 25000
        });

        // --- GLOBAL APP STATE ---
        const APP_STATE = {
            self: null,
            activePeerID: null,
            vault: {
                messages: {}, // { peer_id: [message_objects] }
                profiles: {}, // { peer_id: profile_object }
                contacts: []  // Array of peer IDs
            }
        };

        // --- DOM REFERENCE ENGINE ---
        const DOM_MAP = {
            auth: document.getElementById('auth-portal'),
            shell: document.getElementById('app-shell'),
            chat: document.getElementById('chat-window-overlay'),
            feed: document.getElementById('messages-display-feed'),
            list: document.getElementById('dialogs-list-root'),
            status: document.getElementById('system-status-text'),
            input: document.getElementById('main-chat-input')
        };

        // --- 1. СИСТЕМА ИНИЦИАЛИЗАЦИИ И СЕССИЙ ---

        window.addEventListener('load', function() {
            const secureData = localStorage.getItem('_celestra_enterprise_v10');
            if (secureData) {
                try {
                    const decrypted = JSON.parse(atob(secureData));
                    updateSystemStatus("Восстановление...");
                    socket.emit('auth', { 
                        login: decrypted.u, 
                        password: decrypted.p, 
                        type: 'login' 
                    });
                } catch(error) {
                    console.error("Vault Error:", error);
                    localStorage.removeItem('_celestra_enterprise_v10');
                }
            }
        });

        /**
         * Основной обработчик авторизации.
         * @param {string} mode - 'login' или 'reg'
         */
        function handleAuthAction(mode) {
            const u = document.getElementById('id-input-field').value.trim().toLowerCase();
            const p = document.getElementById('key-input-field').value.trim();
            
            if (!u || !p) {
                alert("Пожалуйста, заполните все поля.");
                return;
            }

            updateSystemStatus("Синхронизация...");
            
            // Сохраняем учетные данные в Vault (Base64)
            localStorage.setItem('_celestra_enterprise_v10', btoa(JSON.stringify({ u, p })));
            
            socket.emit('auth', { login: u, password: p, type: mode });
        }

        socket.on('auth_ok', (userData) => {
            APP_STATE.self = userData;
            
            // Плавный переход интерфейса
            DOM_MAP.auth.style.opacity = '0';
            setTimeout(() => {
                DOM_MAP.auth.style.display = 'none';
                DOM_MAP.shell.style.display = 'flex';
                setTimeout(() => DOM_MAP.shell.style.opacity = '1', 50);
            }, 800);

            // Инициализация профиля
            document.getElementById('my-profile-avatar').src = userData.prof.ava;
            
            // Загрузка реестра контактов из LocalStorage
            const storedRegistry = JSON.parse(localStorage.getItem('_celestra_registry_v10') || "[]");
            APP_STATE.vault.contacts = storedRegistry;
            
            // Запрашиваем историю для каждого контакта
            storedRegistry.forEach(peer => socket.emit('get_h', peer));
            
            updateSystemStatus("Online");
        });

        socket.on('auth_err', (msg) => {
            alert("Ошибка доступа: " + msg);
            localStorage.removeItem('_celestra_enterprise_v10');
            updateSystemStatus("Access Denied");
        });

        // --- 2. ДВИЖОК ОБРАБОТКИ СООБЩЕНИЙ ---

        function executeMessageDispatch() {
            const rawText = DOM_MAP.input.value.trim();
            if (!rawText || !APP_STATE.activePeerID) return;

            const messagePacket = {
                to: APP_STATE.activePeerID,
                txt: rawText,
                type: 'text',
                timestamp: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
            };

            socket.emit('msg', messagePacket);
            DOM_MAP.input.value = '';
        }

        socket.on('receive', (payload) => {
            // Определяем ID собеседника (может быть отправителем или получателем)
            const peer = (payload.msg.f === APP_STATE.self.un) ? payload.room : payload.msg.f;
            
            // Структурирование данных в кэше
            if (!APP_STATE.vault.messages[peer]) APP_STATE.vault.messages[peer] = [];
            APP_STATE.vault.messages[peer].push(payload.msg);
            
            if (payload.senderProf) {
                APP_STATE.vault.profiles[peer] = payload.senderProf;
            }

            // Обновляем реестр контактов
            updateLocalRegistry(peer);
            
            // Если этот чат открыт — мгновенный рендер
            if (APP_STATE.activePeerID === peer) {
                renderChatFeed();
            }
            
            // Обновляем главный список
            renderDialogList();
        });

        socket.on('h_res', (data) => {
            APP_STATE.vault.messages[data.target] = data.msgs;
            APP_STATE.vault.profiles[data.target] = data.prof;
            
            if (APP_STATE.activePeerID === data.target) {
                renderChatFeed();
            }
            renderDialogList();
        });

        // --- 3. СИСТЕМА РЕНДЕРИНГА (UI CONTROLLERS) ---

        /**
         * Перерисовывает список всех диалогов на главном экране.
         */
        function renderDialogList() {
            DOM_MAP.list.innerHTML = '';
            
            const activePeers = Object.keys(APP_STATE.vault.messages);
            
            activePeers.forEach(id => {
                const profile = APP_STATE.vault.profiles[id] || { nick: id, ava: '' };
                const history = APP_STATE.vault.messages[id];
                const lastMsg = history[history.length - 1];

                const row = document.createElement('div');
                row.className = 'dialog-item-row fade-in';
                row.onclick = () => openChatController(id);
                
                row.innerHTML = `
                    <div class="dialog-avatar-frame">
                        <img src="${profile.ava}">
                        <div class="online-dot"></div>
                    </div>
                    <div class="dialog-body-content">
                        <h4>${profile.nick}</h4>
                        <p>${lastMsg ? lastMsg.txt : 'История пуста'}</p>
                    </div>
                `;
                DOM_MAP.list.appendChild(row);
            });
        }

        /**
         * Отрисовывает сообщения внутри открытого чата.
         */
        function renderChatFeed() {
            DOM_MAP.feed.innerHTML = '';
            const messages = APP_STATE.vault.messages[APP_STATE.activePeerID] || [];
            
            messages.forEach(m => {
                const isMe = (m.f === APP_STATE.self.un);
                const bubble = document.createElement('div');
                bubble.className = `message-bubble msg-anim ${isMe ? 'is-me' : 'is-other'}`;
                
                bubble.innerHTML = `
                    ${m.txt}
                    <span class="message-meta">${m.time || ''}</span>
                `;
                DOM_MAP.feed.appendChild(bubble);
            });
            
            // Прокрутка к последнему сообщению
            DOM_MAP.feed.scrollTop = DOM_MAP.feed.scrollHeight;
        }

        // --- 4. НАВИГАЦИЯ И УПРАВЛЕНИЕ ОКНАМИ ---

        function openChatController(peerID) {
            APP_STATE.activePeerID = peerID;
            const profile = APP_STATE.vault.profiles[peerID] || { nick: peerID };
            
            document.getElementById('active-peer-display-name').innerText = profile.nick;
            DOM_MAP.chat.classList.add('is-visible');
            
            renderChatFeed();
            // Фокус на поле ввода (только для десктопа, чтобы не дергать клавиатуру на iOS)
            if (window.innerWidth > 1024) DOM_MAP.input.focus();
        }

        function closeChatController() {
            APP_STATE.activePeerID = null;
            DOM_MAP.chat.classList.remove('is-visible');
        }

        function openProfileController() {
            const modal = document.getElementById('profile-modal-controller');
            const self = APP_STATE.self;
            
            document.getElementById('profile-modal-avatar').src = self.prof.ava;
            document.getElementById('profile-modal-nick').innerText = self.prof.nick;
            document.getElementById('profile-modal-id').innerText = '@' + self.un;
            
            modal.style.display = 'flex';
        }

        function closeProfileController() {
            document.getElementById('profile-modal-controller').style.display = 'none';
        }

        function executeSystemLogout() {
            if (confirm("Выход удалит закэшированные данные на этом устройстве. Продолжить?")) {
                localStorage.clear();
                window.location.reload();
            }
        }

        // --- 5. ВСПОМОГАТЕЛЬНЫЕ УТИЛИТЫ ---

        function updateLocalRegistry(id) {
            let reg = JSON.parse(localStorage.getItem('_celestra_registry_v10') || "[]");
            if (!reg.includes(id)) {
                reg.push(id);
                localStorage.setItem('_celestra_registry_v10', JSON.stringify(reg));
                APP_STATE.vault.contacts = reg;
            }
        }

        function updateSystemStatus(text) {
            DOM_MAP.status.innerText = text;
        }

        function filterDialogList(query) {
            const q = query.toLowerCase();
            const items = document.querySelectorAll('.dialog-item-row');
            
            items.forEach(item => {
                const name = item.querySelector('h4').innerText.toLowerCase();
                item.style.display = name.includes(q) ? 'flex' : 'none';
            });
        }

        // --- 6. SOCKET EVENT MONITORING ---

        socket.on('connect', () => {
            updateSystemStatus("Online");
        });

        socket.on('disconnect', () => {
            updateSystemStatus("Reconnecting...");
        });

        // Обработка потери фокуса для экономии ресурсов
        document.addEventListener('visibilitychange', () => {
            if (!document.hidden && socket.disconnected) {
                socket.connect();
            }
        });

    </script>
</body>
</html>
