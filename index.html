<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="style.css">
    <title>Celestra Premium</title>
</head>
<body>
    <audio id="msg-sound" src="https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3" preload="auto"></audio>

    <div id="auth-screen" class="auth-wrapper">
        <div class="auth-card animate-pop">
            <h1 class="logo-text">CELESTRA</h1>
            <div class="auth-inputs">
                <input type="text" id="login-input" placeholder="Логин">
                <input type="password" id="pass-input" placeholder="Пароль">
            </div>
            <button onclick="auth('login')" class="neon-btn">ВОЙТИ</button>
            <button onclick="auth('register')" class="reg-btn-graphic">РЕГИСТРАЦИЯ</button>
        </div>
    </div>

    <div id="app-container" class="main-layout" style="display: none;">
        <aside class="sidebar" id="main-sidebar">
            <div class="search-section">
                <input type="text" id="user-search" placeholder="Поиск @юзера..." oninput="doSearch()">
                <div id="search-results"></div>
            </div>
            <div id="chats-list" class="scrollable"></div>
            <div class="profile-panel" onclick="openSettings()">
                <img id="my-avatar-btn" src="" class="mini-ava">
                <div class="meta">
                    <span id="my-name-display">...</span>
                    <small>Online</small>
                </div>
            </div>
        </aside>

        <main class="chat-area">
            <div id="welcome-layer" class="welcome-screen">
                <div class="welcome-box animate-pop">
                    <div class="logo-icon">C</div>
                    <h2>Celestra</h2>
                    <p>Выберите чат</p>
                </div>
            </div>

            <div id="chat-active-ui" class="chat-main-wrap" style="display: none;">
                <header class="chat-header">
                    <button class="back-btn" onclick="closeChat()">←</button>
                    <span id="current-contact">Чат</span>
                </header>
                <div id="chat-window" class="scrollable"></div>
                <div class="input-bar">
                    <input type="text" id="msg" placeholder="Сообщение..." onkeydown="if(event.key==='Enter') sendPrivate()">
                    <button onclick="sendPrivate()" class="send-btn">➤</button>
                </div>
            </div>
        </main>
    </div>

    <div id="settings-modal" class="overlay" style="display:none;" onclick="if(event.target==this)this.style.display='none'">
        <div class="nitro-card animate-pop">
            <div id="nitro-banner" class="nitro-banner" onclick="changeBanner()"></div>
            <div class="nitro-main">
                <div class="ava-wrap" onclick="changeAvatarViaLink()">
                    <img id="edit-avatar-preview" src="">
                </div>
                <div class="nitro-info">
                    <input type="text" id="edit-name" class="name-input">
                    <p id="nitro-username" class="tag">@user</p>
                    <label class="label-style">ОБО МНЕ</label>
                    <textarea id="edit-bio" class="bio-input"></textarea>
                </div>
                <div class="nitro-btns">
                    <button onclick="saveProfile()" class="neon-btn">СОХРАНИТЬ</button>
                    <button onclick="logout()" class="danger-btn">ВЫЙТИ</button>
                </div>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let myName = "", currentChatUser = null, chatMessages = {}, myProfile = {}, unread = {};

        function auth(type) {
            const login = document.getElementById('login-input').value;
            const password = document.getElementById('pass-input').value;
            if(!login || !password) return;
            localStorage.setItem('celestra_creds', JSON.stringify({ login, password }));
            socket.emit('auth', { login, password, type });
        }

        socket.on('auth-success', data => {
            myName = data.user; myProfile = data.profile;
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('app-container').style.display = 'flex';
            updateUI();
        });

        function changeBanner() {
            const link = prompt("Ссылка на GIF или цвет:");
            if (link) {
                const b = document.getElementById('nitro-banner');
                if(link.includes('http')) b.style.backgroundImage = `url('${link}')`;
                else b.style.background = link;
            }
        }

        function changeAvatarViaLink() {
            const link = prompt("Ссылка на GIF для авы:");
            if (link) document.getElementById('edit-avatar-preview').src = link;
        }

        function openSettings() {
            const b = document.getElementById('nitro-banner');
            const banner = myProfile.banner || 'linear-gradient(135deg, #6e8efb, #a777e3)';
            if(banner.includes('url')) b.style.backgroundImage = banner;
            else b.style.background = banner;

            document.getElementById('edit-avatar-preview').src = myProfile.avatar || 'https://i.pravatar.cc/150';
            document.getElementById('edit-name').value = myProfile.displayName || "";
            document.getElementById('edit-bio').value = myProfile.bio || "Рад быть здесь!";
            document.getElementById('nitro-username').innerText = "@" + myName;
            document.getElementById('settings-modal').style.display = 'flex';
        }

        function saveProfile() {
            const b = document.getElementById('nitro-banner');
            const data = {
                avatar: document.getElementById('edit-avatar-preview').src,
                displayName: document.getElementById('edit-name').value,
                bio: document.getElementById('edit-bio').value,
                banner: b.style.backgroundImage || b.style.background
            };
            socket.emit('update-profile', data);
            document.getElementById('settings-modal').style.display = 'none';
        }

        function openChat(u) {
            currentChatUser = u;
            if(window.innerWidth <= 768) document.getElementById('main-sidebar').style.display = 'none';
            document.getElementById('welcome-layer').style.display = 'none';
            document.getElementById('chat-active-ui').style.display = 'flex';
            document.getElementById('current-contact').innerText = "@" + u;
            renderMsgs(u);
        }

        function closeChat() {
            document.getElementById('chat-active-ui').style.display = 'none';
            document.getElementById('main-sidebar').style.display = 'flex';
            document.getElementById('welcome-layer').style.display = 'flex';
        }

        function renderMsgs(u) {
            const win = document.getElementById('chat-window'); win.innerHTML = '';
            (chatMessages[u] || []).forEach(m => {
                const div = document.createElement('div');
                div.className = `msg ${m.from === myName ? 'me' : 'them'}`;
                div.innerHTML = `<div class="bubble">${m.text}</div>`;
                win.appendChild(div);
            });
            win.scrollTop = win.scrollHeight;
        }

        function updateUI() {
            document.getElementById('my-avatar-btn').src = myProfile.avatar || 'https://i.pravatar.cc/150';
            document.getElementById('my-name-display').innerText = myProfile.displayName || myName;
        }

        socket.on('profile-updated', d => { myProfile = d; updateUI(); });
        
        function logout() { localStorage.removeItem('celestra_creds'); location.reload(); }
    </script>
</body>
</html>
