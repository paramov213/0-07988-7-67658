<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="style.css">
    <title>Celestra Premium</title>
</head>
<body>
    <audio id="msg-sound" src="https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3" preload="auto"></audio>

    <div id="auth-screen" class="auth-wrapper">
        <div class="auth-card animate-pop">
            <h1 class="logo-text">CELESTRA</h1>
            <div class="auth-inputs">
                <div class="input-box"><input type="text" id="login-input" placeholder="Логин" required></div>
                <div class="input-box"><input type="password" id="pass-input" placeholder="Пароль" required></div>
            </div>
            <p id="error-msg" class="error-txt"></p>
            <button onclick="auth('login')" class="neon-btn">ВОЙТИ</button>
            <button onclick="auth('register')" class="reg-btn-graphic">РЕГИСТРАЦИЯ</button>
        </div>
    </div>

    <div id="app-container" class="main-layout" style="display: none;">
        <aside class="sidebar">
            <div class="search-section">
                <input type="text" id="user-search" placeholder="Поиск @юзера..." oninput="doSearch()">
                <div id="search-results"></div>
            </div>
            <div id="chats-list" class="scrollable"></div>
            <div class="profile-panel" onclick="openSettings()">
                <img id="my-avatar-btn" src="" class="mini-ava">
                <div class="meta">
                    <span id="my-name-display">...</span>
                    <small>Online</small>
                </div>
                <span class="gear">⚙️</span>
            </div>
        </aside>

        <main class="chat-area">
            <div id="welcome-layer" class="welcome-screen">
                <div class="welcome-box animate-pop">
                    <div class="logo-icon">C</div>
                    <h2>Celestra Premium</h2>
                    <p>Выберите чат, чтобы начать общение</p>
                </div>
            </div>

            <div id="chat-active-ui" class="chat-main-wrap" style="display: none;">
                <header class="chat-header"><span id="current-contact">Чат</span></header>
                <div id="chat-window" class="scrollable"></div>
                <div class="input-bar">
                    <label class="attach-btn">📷<input type="file" id="photo-input" onchange="sendPhoto()" hidden></label>
                    <input type="text" id="msg" placeholder="Напишите сообщение..." onkeydown="if(event.key==='Enter') sendPrivate()">
                    <button onclick="sendPrivate()" class="send-btn">➤</button>
                </div>
            </div>
        </main>
    </div>

    <div id="settings-modal" class="overlay" style="display:none;" onclick="if(event.target==this)this.style.display='none'">
        <div class="nitro-card animate-pop">
            <div id="nitro-banner" class="nitro-banner"><button class="edit-banner" onclick="changeBanner()">🎨</button></div>
            <div class="nitro-main">
                <div class="ava-wrap" onclick="document.getElementById('avatar-upload').click()">
                    <img id="edit-avatar-preview" src=""><input type="file" id="avatar-upload" hidden onchange="previewAva(this)">
                </div>
                <div class="nitro-info">
                    <input type="text" id="edit-name" class="name-input">
                    <p id="nitro-username" class="tag">@user</p>
                    <div class="line"></div>
                    <label>ОБО МНЕ</label>
                    <textarea id="edit-bio" class="bio-input" placeholder="Расскажи о себе..."></textarea>
                </div>
                <div class="nitro-btns">
                    <button onclick="saveProfile()" class="neon-btn">СОХРАНИТЬ</button>
                    <button onclick="logout()" class="danger-btn">ВЫЙТИ</button>
                </div>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let myName = "", currentChatUser = null, chatMessages = {}, myProfile = {}, unread = {};

        window.onload = () => {
            const saved = localStorage.getItem('celestra_creds');
            if (saved) socket.emit('auth', { ...JSON.parse(saved), type: 'login' });
        };

        function auth(type) {
            const login = document.getElementById('login-input').value;
            const password = document.getElementById('pass-input').value;
            if(!login || !password) return;
            localStorage.setItem('celestra_creds', JSON.stringify({ login, password }));
            socket.emit('auth', { login, password, type });
        }

        socket.on('auth-success', data => {
            myName = data.user; myProfile = data.profile;
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('app-container').style.display = 'flex';
            updateUI();
            if(data.history) {
                data.history.forEach(m => {
                    const p = m.from === myName ? m.to : m.from;
                    if(!chatMessages[p]) chatMessages[p] = [];
                    chatMessages[p].push(m);
                });
                updateChatsUI();
            }
        });

        function updateUI() {
            document.getElementById('my-avatar-btn').src = myProfile.avatar || 'https://i.pravatar.cc/150';
            document.getElementById('my-name-display').innerText = myProfile.displayName || myName;
        }

        function openSettings() {
            document.getElementById('nitro-banner').style.background = myProfile.banner || 'var(--grad)';
            document.getElementById('edit-avatar-preview').src = myProfile.avatar || 'https://i.pravatar.cc/150';
            document.getElementById('edit-name').value = myProfile.displayName || "";
            // ИСПРАВЛЕННЫЙ ВЫВОД БИО
            document.getElementById('edit-bio').value = myProfile.bio || "";
            document.getElementById('nitro-username').innerText = "@" + myName;
            document.getElementById('settings-modal').style.display = 'flex';
        }

        function saveProfile() {
            const data = {
                avatar: document.getElementById('edit-avatar-preview').src,
                displayName: document.getElementById('edit-name').value,
                bio: document.getElementById('edit-bio').value, // ИСПРАВЛЕННОЕ СОХРАНЕНИЕ БИО
                banner: document.getElementById('nitro-banner').style.background
            };
            socket.emit('update-profile', data);
            document.getElementById('settings-modal').style.display = 'none';
        }

        socket.on('profile-updated', d => { myProfile = d; updateUI(); });

        function openChat(u) {
            currentChatUser = u;
            unread[u] = 0;
            document.getElementById('welcome-layer').style.display = 'none';
            document.getElementById('chat-active-ui').style.display = 'flex';
            document.getElementById('current-contact').innerText = "@" + u;
            renderMsgs(u);
            updateChatsUI();
        }

        function renderMsgs(u) {
            const win = document.getElementById('chat-window'); 
            win.innerHTML = '';
            (chatMessages[u] || []).forEach((m, index) => {
                const div = document.createElement('div');
                div.className = `msg ${m.from === myName ? 'me' : 'them'}`;
                div.style.animationDelay = `${index * 0.03}s`;
                div.innerHTML = `<div class="bubble animate-msg">${m.text || ''} ${m.image ? `<img src="${m.image}">` : ''}</div>`;
                win.appendChild(div);
            });
            win.scrollTop = win.scrollHeight;
        }

        function updateChatsUI() {
            const list = document.getElementById('chats-list'); list.innerHTML = '';
            Object.keys(chatMessages).forEach(u => {
                const div = document.createElement('div');
                div.className = `tab ${currentChatUser === u ? 'active' : ''}`;
                div.onclick = () => openChat(u);
                const count = unread[u] ? `<span class="badge">${unread[u]}</span>` : '';
                div.innerHTML = `<span>${u}</span> ${count}`;
                list.appendChild(div);
            });
        }

        socket.on('msg-receive', m => {
            const p = m.from === myName ? m.to : m.from;
            if(!chatMessages[p]) chatMessages[p] = [];
            chatMessages[p].push(m);
            if(p === currentChatUser) { renderMsgs(p); } 
            else { unread[p] = (unread[p] || 0) + 1; document.getElementById('msg-sound').play(); }
            updateChatsUI();
        });

        function sendPrivate() {
            const v = document.getElementById('msg').value;
            if(v.trim() && currentChatUser) {
                socket.emit('private-message', {to: currentChatUser, text: v});
                document.getElementById('msg').value = '';
            }
        }

        function doSearch() {
            const v = document.getElementById('user-search').value;
            if(v.length > 1) socket.emit('search-user', v);
        }

        socket.on('search-result', d => {
            const res = document.getElementById('search-results');
            res.innerHTML = (d.exists && d.username !== myName) ? `<div class="search-res-item" onclick="openChat('${d.username}')">@${d.username}</div>` : '';
        });

        function previewAva(i) {
            const r = new FileReader();
            r.onload = e => document.getElementById('edit-avatar-preview').src = e.target.result;
            r.readAsDataURL(i.files[0]);
        }

        function changeBanner() {
            const b = prompt("Цвет или URL:");
            if(b) document.getElementById('nitro-banner').style.background = b;
        }

        function logout() { localStorage.removeItem('celestra_creds'); location.reload(); }
    </script>
</body>
</html>
