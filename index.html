<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="style.css">
    <title>Celestra Premium</title>
</head>
<body>
    <audio id="msg-sound" src="https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3" preload="auto"></audio>

    <div id="auth-screen" class="auth-wrapper">
        <div class="glass-login animate-pop">
            <h1 class="logo-text">CELESTRA</h1>
            <p class="auth-subtext">Next-gen messaging</p>
            <input type="text" id="login-input" placeholder="Логин">
            <input type="password" id="pass-input" placeholder="Пароль">
            <p id="error-msg" class="error-txt"></p>
            <button onclick="auth('login')" class="neon-btn">ВОЙТИ</button>
            <button onclick="auth('register')" class="ghost-btn">Создать аккаунт</button>
        </div>
    </div>

    <div id="app-container" class="main-layout" style="display: none;">
        <aside class="sidebar">
            <div class="search-bar">
                <input type="text" id="user-search" placeholder="Поиск @юзеров..." oninput="doSearch()">
                <div id="search-results"></div>
            </div>
            <div id="chats-list" class="scrollable"></div>
            <div class="my-profile-mini" onclick="openSettings()">
                <div class="mini-ava-wrap">
                    <img id="my-avatar-btn" src="" class="mini-ava">
                    <div class="status-dot"></div>
                </div>
                <div class="user-meta">
                    <span id="my-name-display">...</span>
                    <small>Online</small>
                </div>
                <span class="settings-gear">⚙️</span>
            </div>
        </aside>

        <main class="chat-area">
            <header class="chat-top" onclick="viewOtherProfile()">
                <div class="header-info">
                    <span id="current-contact">Выберите чат</span>
                    <small id="typing-indicator" style="display: none;">печатает...</small>
                </div>
            </header>
            <div id="chat-window" class="scrollable"></div>
            <div class="input-container" id="input-block" style="display:none;">
                <div class="input-glass">
                    <label class="btn-img">📷<input type="file" id="photo-input" onchange="sendPhoto()" hidden></label>
                    <input type="text" id="msg" placeholder="Напишите сообщение..." oninput="sendTyping()" onkeydown="if(event.key==='Enter') sendPrivate()">
                    <button onclick="sendPrivate()" class="send-arr">➤</button>
                </div>
            </div>
        </main>
    </div>

    <div id="settings-modal" class="overlay" style="display:none;" onclick="if(event.target==this)this.style.display='none'">
        <div class="nitro-card animate-pop">
            <div id="nitro-banner" class="nitro-banner">
                <button class="edit-banner-btn" id="edit-banner-trigger">🎨 Сменить фон</button>
            </div>
            <div class="nitro-content">
                <div class="ava-nitro" onclick="document.getElementById('avatar-upload').click()">
                    <img id="edit-avatar-preview" src="">
                    <div class="ava-hint">ИЗМЕНИТЬ</div>
                    <input type="file" id="avatar-upload" hidden onchange="previewAva(this)">
                </div>
                <div class="nitro-body">
                    <input type="text" id="edit-name" class="nitro-name-input" placeholder="Ваше имя">
                    <p id="nitro-username" class="tag">@username</p>
                    <div class="divider"></div>
                    <label class="section-label">ОБО МНЕ</label>
                    <div id="bio-view" class="bio-display"></div>
                    <textarea id="edit-bio" class="bio-edit" placeholder="Расскажите о себе..."></textarea>
                </div>
                <div class="nitro-footer" id="modal-btns"></div>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let myName = "", currentChatUser = null, chatMessages = {}, myProfile = {}, typingTimeout;

        // === АВТО-ВХОД ===
        window.onload = () => {
            const saved = localStorage.getItem('celestra_creds');
            if (saved) {
                const data = JSON.parse(saved);
                document.getElementById('auth-screen').style.opacity = '0.5';
                socket.emit('auth', { ...data, type: 'login' });
            }
        };

        function auth(type) {
            const login = document.getElementById('login-input').value;
            const password = document.getElementById('pass-input').value;
            if(!login || !password) return;
            localStorage.setItem('celestra_creds', JSON.stringify({ login, password }));
            socket.emit('auth', { login, password, type });
        }

        socket.on('auth-success', data => {
            myName = data.user; myProfile = data.profile;
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('app-container').style.display = 'flex';
            updateMyUI();
            if(data.history) {
                data.history.forEach(m => {
                    const p = m.from === myName ? m.to : m.from;
                    if(!chatMessages[p]) chatMessages[p] = [];
                    chatMessages[p].push(m);
                });
                updateChatsUI();
            }
        });

        socket.on('auth-error', msg => {
            document.getElementById('error-msg').innerText = msg;
            document.getElementById('auth-screen').style.opacity = '1';
            localStorage.removeItem('celestra_creds');
        });

        function updateMyUI() {
            document.getElementById('my-avatar-btn').src = myProfile.avatar || 'https://i.pravatar.cc/150?u='+myName;
            document.getElementById('my-name-display').innerText = myProfile.displayName || myName;
        }

        // === NITRO ПРОФИЛЬ ===
        function openSettings() { showNitroProfile(myProfile, true, myName); }
        function viewOtherProfile() { if(currentChatUser) socket.emit('get-user-profile', currentChatUser); }
        socket.on('user-profile-data', d => showNitroProfile(d, false, d.username));

        function showNitroProfile(data, isMe, username) {
            document.getElementById('nitro-banner').style.background = data.banner || 'var(--grad)';
            document.getElementById('edit-avatar-preview').src = data.avatar || 'https://i.pravatar.cc/150?u='+username;
            document.getElementById('nitro-username').innerText = "@" + username;
            
            const bioView = document.getElementById('bio-view');
            const bioEdit = document.getElementById('edit-bio');
            const nameEdit = document.getElementById('edit-name');
            const btns = document.getElementById('modal-btns');

            if(isMe) {
                bioView.style.display = 'none'; bioEdit.style.display = 'block';
                nameEdit.removeAttribute('readonly'); nameEdit.value = data.displayName || "";
                bioEdit.value = data.bio || "";
                document.getElementById('edit-banner-trigger').style.display = 'block';
                btns.innerHTML = `<button onclick="saveProfile()" class="neon-btn">Сохранить</button><button onclick="logout()" class="danger-btn">Выйти</button>`;
                document.getElementById('edit-banner-trigger').onclick = () => {
                    const b = prompt("Вставь HEX, Gradient или URL:", data.banner || "");
                    if(b) document.getElementById('nitro-banner').style.background = b;
                };
            } else {
                bioView.style.display = 'block'; bioEdit.style.display = 'none';
                nameEdit.setAttribute('readonly', true); nameEdit.value = data.displayName || username;
                bioView.innerText = data.bio || "Пользователь скрыл информацию о себе.";
                document.getElementById('edit-banner-trigger').style.display = 'none';
                btns.innerHTML = `<button onclick="document.getElementById('settings-modal').style.display='none'" class="ghost-btn">Закрыть</button>`;
            }
            document.getElementById('settings-modal').style.display = 'flex';
        }

        function saveProfile() {
            const profileData = {
                avatar: document.getElementById('edit-avatar-preview').src,
                displayName: document.getElementById('edit-name').value,
                bio: document.getElementById('edit-bio').value,
                banner: document.getElementById('nitro-banner').style.background
            };
            socket.emit('update-profile', profileData);
            document.getElementById('settings-modal').style.display = 'none';
        }

        socket.on('profile-updated', d => { myProfile = d; updateMyUI(); });
        function logout() { localStorage.removeItem('celestra_creds'); location.reload(); }

        // === ЧАТ И СООБЩЕНИЯ ===
        function doSearch() {
            const v = document.getElementById('user-search').value;
            if(v.length > 1) socket.emit('search-user', v);
        }
        socket.on('search-result', d => {
            const res = document.getElementById('search-results');
            res.innerHTML = (d.exists && d.username !== myName) ? `<div class="search-res-item" onclick="openChat('${d.username}')">@${d.username}</div>` : '';
        });

        function openChat(u) {
            currentChatUser = u;
            document.getElementById('current-contact').innerText = "@" + u;
            document.getElementById('input-block').style.display = 'block';
            document.getElementById('search-results').innerHTML = '';
            renderMsgs(u);
            updateChatsUI();
        }

        function renderMsgs(u) {
            const win = document.getElementById('chat-window'); win.innerHTML = '';
            (chatMessages[u] || []).forEach(m => {
                const div = document.createElement('div');
                div.className = `msg ${m.from === myName ? 'me' : 'them'}`;
                div.innerHTML = `<div class="msg-bubble animate-msg">${m.text || ''} ${m.image ? `<img src="${m.image}">` : ''}</div><div class="m-time">${m.time}</div>`;
                win.appendChild(div);
            });
            win.scrollTop = win.scrollHeight;
        }

        function updateChatsUI() {
            const list = document.getElementById('chats-list'); list.innerHTML = '';
            Object.keys(chatMessages).forEach(u => {
                const div = document.createElement('div');
                div.className = `chat-tab ${currentChatUser === u ? 'active' : ''}`;
                div.onclick = () => openChat(u);
                div.innerText = u;
                list.appendChild(div);
            });
        }

        socket.on('msg-receive', m => {
            const p = m.from === myName ? m.to : m.from;
            if(!chatMessages[p]) chatMessages[p] = [];
            chatMessages[p].push(m);
            document.getElementById('msg-sound').play();
            if(p === currentChatUser) renderMsgs(p);
            updateChatsUI();
        });

        function sendPrivate() {
            const v = document.getElementById('msg').value;
            if(v.trim() && currentChatUser) {
                socket.emit('private-message', {to: currentChatUser, text: v});
                document.getElementById('msg').value = '';
            }
        }
        
        function sendPhoto() {
            const f = document.getElementById('photo-input').files[0];
            if(f && currentChatUser) {
                const r = new FileReader();
                r.onload = e => socket.emit('private-message', {to: currentChatUser, text: "", image: e.target.result});
                r.readAsDataURL(f);
            }
        }

        function previewAva(i) {
            const r = new FileReader();
            r.onload = e => document.getElementById('edit-avatar-preview').src = e.target.result;
            r.readAsDataURL(i.files[0]);
        }
    </script>
</body>
</html>
