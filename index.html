<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nitro Messenger</title>
    <link rel="stylesheet" href="style.css">
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>

    <!-- Экран авторизации -->
    <div id="auth-screen" class="screen">
        <div class="auth-card">
            <h2>С возвращением!</h2>
            <p class="subtitle">Мы так рады видеть вас снова!</p>
            <input type="text" id="auth-username" placeholder="Имя пользователя">
            <input type="password" id="auth-password" placeholder="Пароль">
            <button id="login-btn">Вход</button>
            <button id="register-btn" class="secondary">Зарегистрироваться</button>
        </div>
    </div>

    <!-- Основной интерфейс -->
    <div id="app-screen" class="screen hidden">
        <div class="sidebar">
            <div class="sidebar-header">
                <div class="user-profile-trigger" id="my-profile-btn">
                    <img src="" alt="Avatar" id="my-avatar-img">
                    <div class="status-indicator online"></div>
                </div>
                <input type="text" id="user-search" placeholder="Поиск друзей...">
            </div>
            <div id="chat-list" class="chat-list">
                <!-- Сюда динамически добавляются чаты -->
            </div>
        </div>

        <div class="chat-area">
            <div id="chat-header" class="hidden">
                <div class="receiver-info">
                    <span id="chat-with-name">Username</span>
                    <span id="chat-with-status" class="status-text">Оффлайн</span>
                </div>
                <div id="streak-counter" class="streak-badge hidden">
                    🔥 <span id="streak-val">0</span>
                </div>
            </div>
            <div id="messages-container"></div>
            <div class="input-area">
                <input type="text" id="message-input" placeholder="Написать сообщение...">
                <button id="send-btn">➤</button>
            </div>
        </div>
    </div>

    <!-- Модальное окно профиля -->
    <div id="profile-modal" class="modal hidden">
        <div class="modal-content">
            <div class="banner" id="profile-banner-preview"></div>
            <div class="profile-header">
                <img src="" id="profile-avatar-preview" class="editable-avatar">
                <button id="close-modal">✕</button>
            </div>
            <div class="profile-body">
                <label>Отображаемое имя</label>
                <input type="text" id="edit-display-name">
                <label>О себе</label>
                <textarea id="edit-bio"></textarea>
                <label>URL Аватара (GIF поддерживается)</label>
                <input type="text" id="edit-avatar-url">
                <label>Цвет свечения (Hex/RGBA)</label>
                <input type="text" id="edit-glow-color">
                <button id="save-profile">Сохранить изменения</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
