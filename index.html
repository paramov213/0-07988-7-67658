<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BROKE | P2P Messenger</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
</head>
<body>

    <div id="ban-screen" class="hidden">
        <div class="shield-icon">🛡️</div>
        <h1>ACCESS DENIED</h1>
        <p>Ваше устройство заблокировано администратором.</p>
    </div>

    <div id="login-modal" class="modal">
        <div class="modal-content glass">
            <h2>Authentication</h2>
            <input type="text" id="admin-id-input" placeholder="Enter ID (or press Enter for Guest)">
            <button id="start-btn">Join Network</button>
        </div>
    </div>

    <div id="app" class="hidden">
        <header class="glass">
            <div class="user-info">
                <span id="my-status-badge" class="badge">USER</span>
                <span id="my-peer-id">ID: ...</span>
            </div>
            <div class="header-controls">
                <button id="call-btn" class="icon-btn">📞</button>
                <button id="panic-btn" class="icon-btn">🔒</button>
            </div>
        </header>

        <div id="admin-panel" class="glass hidden">
            <h3>NETWORK CONTROL</h3>
            <div class="admin-grid">
                <input type="text" id="target-id" placeholder="Target Peer ID">
                <button onclick="adminAction('GIVE_PREMIUM')" class="btn-gold">Give Premium</button>
                <button onclick="adminAction('BAN')" class="btn-red">The Ban Hammer</button>
                <button onclick="adminAction('PURGE')" class="btn-outline">Remote Purge</button>
                <button onclick="adminAction('LOCK')" class="btn-outline">Global Lock</button>
            </div>
        </div>

        <main id="chat-box" class="chat-container"></main>

        <footer class="glass">
            <div id="typing-indicator"></div>
            <div class="input-area">
                <input type="text" id="msg-input" placeholder="Write a message...">
                <button id="send-btn">Send</button>
            </div>
        </footer>
    </div>

    <div id="call-overlay" class="hidden glass">
        <div class="call-info">
            <div class="avatar">👤</div>
            <p>Входящий звонок...</p>
        </div>
        <div class="call-btns">
            <button id="accept-call" class="btn-green">Accept</button>
            <button id="reject-call" class="btn-red">Decline</button>
        </div>
    </div>

    <div id="video-container" class="hidden">
        <video id="remote-video" autoplay playsinline></video>
        <video id="local-video" autoplay muted playsinline></video>
        <button id="hangup-btn">✕</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
