<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Cloud Messenger</title>
</head>
<body>

    <div id="auth-screen" class="modal">
        <div class="auth-box">
            <h2>Messenger</h2>
            <input type="text" id="login-input" placeholder="Логин">
            <input type="password" id="pass-input" placeholder="Пароль">
            <div class="auth-buttons">
                <button onclick="auth('login')">Войти</button>
                <button onclick="auth('register')" class="secondary">Регистрация</button>
            </div>
            <p id="error-msg" style="color: #ff4d4d; margin-top: 10px;"></p>
        </div>
    </div>

    <div id="app-container" class="app-container" style="display: none;">
        <div class="video-grid">
            <video id="localVideo" autoplay muted playsinline></video>
            <video id="remoteVideo" autoplay playsinline></video>
            <button onclick="logout()" class="logout-btn">Выход</button>
        </div>

        <div id="chat-window"></div>

        <div class="input-area">
            <label class="file-label">
                📷
                <input type="file" id="photo-input" accept="image/*" hidden>
            </label>
            <input type="text" id="msg" placeholder="Сообщение...">
            <button onclick="send()">➤</button>
            <button onclick="startCall()" class="call-btn">📞</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let myName = "";

        // 1. ПРОВЕРКА АВТО-ВХОДА
        window.onload = () => {
            const saved = localStorage.getItem('chat_session');
            if (saved) {
                socket.emit('login', JSON.parse(saved));
            }
        };

        function auth(type) {
            const login = document.getElementById('login-input').value;
            const pass = document.getElementById('pass-input').value;
            if (!login || !pass) return;
            
            const data = { login, password: pass };
            localStorage.setItem('chat_session', JSON.stringify(data)); // Сохраняем сессию
            socket.emit(type, data);
        }

        socket.on('auth-success', (data) => {
            myName = data.user;
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('app-container').style.display = 'flex';
        });

        socket.on('auth-error', (msg) => {
            localStorage.removeItem('chat_session');
            document.getElementById('error-msg').innerText = msg;
        });

        function logout() {
            localStorage.removeItem('chat_session');
            location.reload();
        }

        // 2. ЧАТ И ФОТО
        function send() {
            const text = document.getElementById('msg').value;
            const file = document.getElementById('photo-input').files[0];

            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    socket.emit('message', { text, image: e.target.result });
                    document.getElementById('photo-input').value = '';
                };
                reader.readAsDataURL(file);
            } else if (text.trim()) {
                socket.emit('message', { text });
            }
            document.getElementById('msg').value = '';
        }

        socket.on('message', (data) => {
            const chat = document.getElementById('chat-window');
            const div = document.createElement('div');
            div.className = `msg-bubble ${data.user === myName ? 'my-msg' : ''}`;
            
            div.innerHTML = `<small>${data.user} • ${data.time}</small><br>`;
            if (data.text) div.innerHTML += `<span>${data.text}</span>`;
            if (data.image) div.innerHTML += `<img src="${data.image}" class="chat-img">`;
            
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        });

        // 3. ЗВОНКИ
        async function startCall() {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            document.getElementById('localVideo').srcObject = stream;
        }
    </script>
</body>
</html>
