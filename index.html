<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BROKE | P2P Encrypted Messenger</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
</head>
<body>

    <div id="ban-screen" class="hidden-overlay">
        <h1>ACCESS DENIED</h1>
        <p>Your ID has been blacklisted by Network Control.</p>
    </div>

    <div id="admin-modal" class="modal-overlay">
        <div class="modal-content glass">
            <h2>NETWORK ACCESS</h2>
            <input type="password" id="admin-input" placeholder="Enter Admin ID...">
            <button onclick="checkAdmin()">AUTHENTICATE</button>
        </div>
    </div>

    <div id="app" class="app-container hidden">
        <aside class="sidebar glass">
            <div class="user-profile">
                <div id="user-badge" class="badge">USER</div>
                <p id="my-id-display">Connecting...</p>
            </div>

            <div class="admin-panel hidden" id="admin-controls">
                <h3>NETWORK CONTROL</h3>
                <input type="text" id="target-peer-id" placeholder="Target Peer ID">
                <div class="admin-btns">
                    <button class="btn-ban" onclick="sendAdminCmd('CMD_BAN')">BAN</button>
                    <button class="btn-prem" onclick="sendAdminCmd('CMD_GIVE_PREMIUM')">GIVE PREMIUM</button>
                    <button class="btn-purge" onclick="sendAdminCmd('REMOTE_PURGE')">PURGE DB</button>
                </div>
                <button class="btn-lock" onclick="broadcastCmd('CMD_LOCK')">LOCK NETWORK</button>
            </div>

            <div class="contacts">
                <input type="text" id="dest-id" placeholder="Remote Peer ID">
                <button onclick="connectToPeer()">CONNECT</button>
            </div>

            <div class="ghost-tools hidden" id="premium-tools">
                <h3>GHOST TOOLS</h3>
                <button onclick="toggleFakeHistory()">FAKE HISTORY</button>
                <select id="self-destruct-timer">
                    <option value="0">No Self-Destruct</option>
                    <option value="5000">5 Seconds</option>
                    <option value="10000">10 Seconds</option>
                    <option value="30000">30 Seconds</option>
                </select>
            </div>
        </aside>

        <main class="chat-area glass">
            <header class="chat-header">
                <div id="active-contact">Waiting for connection...</div>
                <div class="call-controls">
                    <button onclick="startCall('video')">📹</button>
                    <button onclick="startCall('audio')">📞</button>
                </div>
            </header>

            <div id="messages-container"></div>

            <footer class="chat-input">
                <input type="text" id="msg-input" placeholder="Type a message...">
                <button id="send-btn">SEND</button>
            </footer>
        </main>
    </div>

    <div id="call-overlay" class="hidden-overlay glass">
        <video id="remote-video" autoplay playsinline></video>
        
        <div class="local-video-container">
            <video id="local-video" autoplay playsinline muted></video>
        </div>

        <div class="call-ui-wrapper">
            <div id="call-status" class="glass">Incoming Call...</div>
            <div class="call-btns">
                <button id="accept-call" class="btn-call-accept">ACCEPT</button>
                <button id="decline-call" class="btn-call-decline">DECLINE</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
