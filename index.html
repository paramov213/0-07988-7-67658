<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="style.css">
    <title>Celestra Discord Style</title>
</head>
<body>
    <div id="app-container" class="discord-layout">
        <aside class="sidebar-wrapper" id="main-sidebar">
            <div class="search-bar">
                <input type="text" id="user-search" placeholder="Поиск @юзера..." oninput="doSearch()">
            </div>
            <nav class="chat-list scrollable" id="chats-list"></nav>
            
            <div class="user-footer" onclick="openSettings()">
                <div class="footer-avatar">
                    <img id="my-avatar-btn" src="https://i.pravatar.cc/150">
                    <div class="status-dot"></div>
                </div>
                <div class="footer-info">
                    <span id="my-name-display" class="display-name">Загрузка...</span>
                    <span class="status-text">Online</span>
                </div>
                <div class="footer-settings">⚙️</div>
            </div>
        </aside>

        <main class="chat-view" id="main-chat">
            <div id="welcome-layer" class="welcome-view">
                <div class="welcome-content">
                    <h2>Celestra Premium</h2>
                    <p>Выберите чат или найдите собеседника</p>
                </div>
            </div>

            <div id="chat-active-ui" class="active-chat-container" style="display: none;">
                <header class="chat-top-bar">
                    <button class="mobile-back" onclick="closeChat()">←</button>
                    <span class="hash">#</span>
                    <span id="current-contact" class="header-user">Чат</span>
                </header>
                <div id="chat-window" class="messages-container scrollable"></div>
                <div class="message-input-area">
                    <div class="input-wrapper">
                        <input type="text" id="msg" placeholder="Написать сообщение..." onkeydown="if(event.key==='Enter') sendPrivate()">
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div id="settings-modal" class="modal-overlay" style="display:none;" onclick="if(event.target==this)this.style.display='none'">
        <div class="nitro-card" onclick="event.stopPropagation()">
            <div id="nitro-banner" class="nitro-header" onclick="changeBanner()"></div>
            <div class="nitro-body">
                <div class="avatar-holder" onclick="document.getElementById('file-input').click()" oncontextmenu="event.preventDefault(); changeAvatarViaLink()">
                    <img id="edit-avatar-preview" src="">
                    <input type="file" id="file-input" hidden onchange="uploadPhoto(this)">
                </div>
                <div class="nitro-main-info">
                    <input type="text" id="edit-name" class="name-edit-input" placeholder="Имя">
                    <p id="nitro-username" class="tag-text">@username</p>
                    <div class="separator"></div>
                    <label class="section-label">ОБО МНЕ</label>
                    <textarea id="edit-bio" class="bio-textarea" placeholder="Расскажите о себе..."></textarea>
                </div>
                <div class="nitro-footer-btns">
                    <button onclick="saveProfile()" class="btn-save">Сохранить</button>
                    <button onclick="logout()" class="btn-logout">Выйти</button>
                </div>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let myName = "", myProfile = {}, currentChatUser = null;

        function uploadPhoto(input) {
            const reader = new FileReader();
            reader.onload = e => document.getElementById('edit-avatar-preview').src = e.target.result;
            reader.readAsDataURL(input.files[0]);
        }

        function changeAvatarViaLink() {
            const link = prompt("Ссылка на GIF:");
            if (link) document.getElementById('edit-avatar-preview').src = link;
        }

        function changeBanner() {
            const link = prompt("Ссылка на GIF или цвет для баннера:");
            if (!link) return;
            const b = document.getElementById('nitro-banner');
            if(link.includes('http')) b.style.backgroundImage = `url('${link}')`;
            else b.style.background = link;
        }

        function openSettings() {
            const b = document.getElementById('nitro-banner');
            const banner = myProfile.banner || 'linear-gradient(135deg, #6e8efb, #a777e3)';
            if(banner.includes('url')) b.style.backgroundImage = banner;
            else b.style.background = banner;

            document.getElementById('edit-avatar-preview').src = myProfile.avatar || 'https://i.pravatar.cc/150';
            document.getElementById('edit-name').value = myProfile.displayName || "";
            document.getElementById('edit-bio').value = myProfile.bio || "Рад быть здесь!";
            document.getElementById('nitro-username').innerText = "@" + myName;
            document.getElementById('settings-modal').style.display = 'flex';
        }

        function saveProfile() {
            const b = document.getElementById('nitro-banner');
            const data = {
                avatar: document.getElementById('edit-avatar-preview').src,
                displayName: document.getElementById('edit-name').value,
                bio: document.getElementById('edit-bio').value,
                banner: b.style.backgroundImage || b.style.background
            };
            socket.emit('update-profile', data);
            document.getElementById('settings-modal').style.display = 'none';
        }

        socket.on('auth-success', data => {
            myName = data.user; myProfile = data.profile;
            document.getElementById('app-container').style.display = 'flex';
            updateUI();
        });

        function updateUI() {
            document.getElementById('my-avatar-btn').src = myProfile.avatar || 'https://i.pravatar.cc/150';
            document.getElementById('my-name-display').innerText = myProfile.displayName || myName;
        }

        function openChat(u) {
            currentChatUser = u;
            if(window.innerWidth <= 768) {
                document.getElementById('main-sidebar').style.display = 'none';
                document.getElementById('main-chat').style.display = 'flex';
            }
            document.getElementById('welcome-layer').style.display = 'none';
            document.getElementById('chat-active-ui').style.display = 'flex';
            document.getElementById('current-contact').innerText = u;
        }

        function closeChat() {
            document.getElementById('main-sidebar').style.display = 'flex';
            document.getElementById('main-chat').style.display = 'none';
        }
    </script>
</body>
</html>
